<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RelayPay Pro - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 450px;
  width: 100%;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo h1 {
  font-size: 32px;
  background: linear-gradient(135deg, #fff 0%, #fb923c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}
.logo p {
  color: #94a3b8;
  font-size: 14px;
  margin-top: 8px;
}
.card {
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid #1e293b;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.tabs {
  display: flex;
  margin-bottom: 24px;
  border-bottom: 2px solid #1e293b;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  cursor: pointer;
  color: #64748b;
  font-weight: 600;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.tab.active {
  color: #fb923c;
  border-bottom-color: #fb923c;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #cbd5e1;
  font-size: 14px;
  font-weight: 500;
}
.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  transition: border-color 0.2s;
}
.form-group input:focus {
  outline: none;
  border-color: #fb923c;
}
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(251, 146, 60, 0.4);
}
.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  display: none;
}
.error.show { display: block; }
.success {
  background: rgba(34, 197, 94, 0.1);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #86efac;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  display: none;
}
.success.show { display: block; }
.divider {
  text-align: center;
  margin: 24px 0 16px;
  color: #64748b;
  font-size: 13px;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: #1e293b;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.link {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
  color: #94a3b8;
}
.link a {
  color: #fb923c;
  text-decoration: none;
  font-weight: 600;
}
.dashboard {
  display: none;
}
.dashboard.show { display: block; }
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.user-info {
  background: rgba(251, 146, 60, 0.1);
  border: 1px solid rgba(251, 146, 60, 0.3);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
}
.user-info h3 { color: #fb923c; margin-bottom: 4px; }
.user-info p { color: #94a3b8; font-size: 14px; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: #0f172a;
  border: 1px solid #1e293b;
  padding: 16px;
  border-radius: 12px;
}
.stat-card .label {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 4px;
}
.stat-card .value {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
}
.btn-secondary {
  background: transparent;
  border: 1px solid #334155;
  color: #cbd5e1;
  margin-top: 8px;
}
.btn-secondary:hover {
  background: #1e293b;
  border-color: #fb923c;
}
.btn-danger {
  background: #dc2626;
  margin-top: 8px;
}
.btn-danger:hover {
  background: #b91c1c;
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>🚛 RelayPay Pro</h1>
    <p>Sistema profesional de payroll para Amazon Relay</p>
  </div>

  <div id="auth-section" class="card">
    <div class="tabs">
      <div class="tab active" data-tab="login">Iniciar Sesión</div>
      <div class="tab" data-tab="signup">Crear Cuenta</div>
    </div>

    <div id="error-msg" class="error"></div>
    <div id="success-msg" class="success"></div>

    <!-- LOGIN FORM -->
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" required placeholder="Tu contraseña">
      </div>
      <button type="submit" class="btn">Iniciar Sesión</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signup-form" style="display:none;">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="signup-name" required placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Nombre de tu empresa</label>
        <input type="text" id="signup-company" required placeholder="Mi Compañía LLC">
      </div>
      <div class="form-group">
        <label>Contraseña (mínimo 6 caracteres)</label>
        <input type="password" id="signup-password" required minlength="6" placeholder="Crea una contraseña">
      </div>
      <button type="submit" class="btn">Crear cuenta gratis (14 días)</button>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="card dashboard">
    <div class="dashboard-header">
      <h2 id="welcome-msg">Bienvenido</h2>
      <button id="logout-btn" class="btn btn-secondary" style="width:auto; padding: 8px 16px;">Cerrar Sesión</button>
    </div>

    <div class="user-info">
      <h3 id="company-name">Mi Compañía</h3>
      <p id="user-email">user@email.com</p>
      <p id="plan-info" style="margin-top: 8px;">Plan: Trial (14 días)</p>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">Estado</div>
        <div class="value" id="stat-status">Activo</div>
      </div>
      <div class="stat-card">
        <div class="label">Días restantes</div>
        <div class="value" id="stat-days">14</div>
      </div>
    </div>

    <button id="upgrade-btn" class="btn" onclick="upgradePlan()">Actualizar Plan</button>
    <button id="open-app-btn" class="btn btn-secondary" onclick="openMainApp()">Abrir App Principal</button>
    <button id="download-btn" class="btn btn-secondary" onclick="downloadApp()">Descargar App (HTML)</button>
  </div>
</div>

<script>
const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000'
  : 'https://relaypay-backend-production.up.railway.app';

let currentUser = null;
let currentToken = null;

// Load from localStorage on page load
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('relaypay_session');
  if (saved) {
    try {
      const session = JSON.parse(saved);
      currentUser = session.user;
      currentToken = session.token;
      showDashboard();
    } catch (e) {
      localStorage.removeItem('relaypay_session');
    }
  }
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('login-form').style.display = target === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = target === 'signup' ? 'block' : 'none';
    clearMessages();
  });
});

// Login
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  try {
    const res = await fetch(API_URL + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
    currentUser = data.user;
    currentToken = data.token;
    localStorage.setItem('relaypay_session', JSON.stringify(data));
    showDashboard();
    showSuccess('¡Bienvenido de vuelta!');
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Iniciar Sesión';
  }
});

// Signup
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const companyName = document.getElementById('signup-company').value;
  const password = document.getElementById('signup-password').value;
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';
  try {
    const res = await fetch(API_URL + '/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name, companyName })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al crear cuenta');
    currentUser = data.user;
    currentToken = data.token;
    localStorage.setItem('relaypay_session', JSON.stringify(data));
    showDashboard();
    showSuccess('¡Cuenta creada! Tienes 14 días gratis.');
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Crear cuenta gratis (14 días)';
  }
});

// Logout
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('relaypay_session');
  currentUser = null;
  currentToken = null;
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('dashboard').classList.remove('show');
});

async function showDashboard() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  document.getElementById('welcome-msg').textContent = `Bienvenido, ${currentUser.name}`;
  document.getElementById('company-name').textContent = currentUser.company_name || 'Mi Compañía';
  document.getElementById('user-email').textContent = currentUser.email;
  
  // Always fetch fresh data from /api/auth/me to get latest subscription status
  try {
    const meRes = await fetch(API_URL + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + currentToken }
    });
    if (meRes.ok) {
      const meData = await meRes.json();
      currentUser = meData.user;
      localStorage.setItem('relaypay_session', JSON.stringify({ token: currentToken, user: currentUser }));
    }
  } catch (e) {
    console.warn('Failed to refresh user data, using cached:', e.message);
  }
  
  const trialEnd = new Date(currentUser.trial_ends_at);
  const now = new Date();
  const daysLeft = Math.max(0, Math.ceil((trialEnd - now) / (1000 * 60 * 60 * 24)));
  document.getElementById('stat-days').textContent = daysLeft;
  if (currentUser.subscription_status === 'active') {
    document.getElementById('plan-info').textContent = 'Plan: Pro (Activo)';
    document.getElementById('stat-status').textContent = 'Activo';
    document.getElementById('upgrade-btn').style.display = 'none';
  } else {
    document.getElementById('plan-info').textContent = `Plan: Trial (${daysLeft} días restantes)`;
    document.getElementById('stat-status').textContent = 'Trial';
    document.getElementById('upgrade-btn').style.display = 'block';
  }
}

async function upgradePlan() {
  showSuccess('Abriendo opciones de pago...');
  // Aquí iría la integración con Stripe Checkout
  const res = await fetch(API_URL + '/api/stripe/create-checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + currentToken },
    body: JSON.stringify({ plan: 'pro' })
  });
  const data = await res.json();
  if (data.url) {
    window.location.href = data.url;
  } else {
    showError('Error: ' + (data.error || 'No se pudo iniciar el pago'));
  }
}

function openMainApp() {
  // Navigate in same tab (avoids popup blocker)
  showSuccess('Abriendo RelayPay Pro...');
  window.location.href = './nomina_v71.html';
}

function downloadApp() {
  // Download the standalone HTML app
  showSuccess('Descargando RelayPay Pro...');
  const link = document.createElement('a');
  link.href = './nomina_v71.html';
  link.download = 'RelayPay-Pro.html';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 8000);
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function clearMessages() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
}
</script>

</body>
</html>
