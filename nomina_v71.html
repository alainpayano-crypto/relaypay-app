function renderPayrollView() {
  // Filter out paid invoices by default - payroll is for the CURRENT active week only
  const activeInvoices = APP.invoices.filter(i => i.status !== 'pagada');
  const paidInvoices = APP.invoices.filter(i => i.status === 'pagada');

  // If no active invoice selected, use the most recent ACTIVE one
  let selectedInvoiceId = APP._selectedPayrollInvoiceId;
  if (!selectedInvoiceId && activeInvoices.length > 0) {
    // Pick the most recent active invoice
    selectedInvoiceId = [...activeInvoices].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0].id;
  }

  // If only paid invoices exist, show the most recent one with a notice
  if (!selectedInvoiceId && paidInvoices.length > 0) {
    selectedInvoiceId = [...paidInvoices].sort((a, b) => new Date(b.paidAt || b.createdAt) - new Date(a.paidAt || a.createdAt))[0].id;
  }

  const selectedInvoice = APP.invoices.find(i => i.id === selectedInvoiceId);
  const allTrips = selectedInvoice ? (selectedInvoice.trips || []).map(t => ({
    ...t,
    invoiceId: selectedInvoice.id,
    invoiceLabel: selectedInvoice.label,
    commissionPct: selectedInvoice.commissionPct,
  })) : [];

  // Find owner's company (PAYANO EXPRESS) — NOT excluded from totals anymore
  // The owner sees their revenue + net (no commission) in the global totals
  const ownerComp = APP.companies.find(c => c.isOwner) || APP.companies.find(c => /payano express/i.test(c.name));
  const ownerCompId = ownerComp ? ownerComp.id : null;
  
  // Use ALL trips (including owner company) for global totals
  const tripsForGlobalTotals = allTrips;
  const payrollByDriver = calculatePayrollByDriver(allTrips);
  const payrollByCompany = calculatePayrollByCompany(tripsForGlobalTotals);
  const totalGross = tripsForGlobalTotals.reduce((s, t) => s + t.pay, 0);
  // Total commission uses per-company rates (PAYANO EXPRESS = 0%)
  let totalComm = 0;
  payrollByCompany.forEach(c => {
    const compObj = APP.companies.find(co => co.name === c.companyName);
    if (compObj && compObj.isOwner) return; // Owner doesn't pay commission
    const pct = compObj && compObj.commissionPct != null ? compObj.commissionPct : (APP.settings.commissionPct || 10);
    totalComm += c.grossRevenue * (pct / 100);
  });
  const totalNet = totalGross - totalComm;
  const totalMiles = tripsForGlobalTotals.reduce((s, t) => s + (t.miles || 0), 0);
  const totalDriverPay = payrollByDriver.reduce((s, d) => s + d.netPay, 0);
  
  // Total tolls across all companies
  let totalTollsAllCompanies = 0;
  (APP.pendingTolls || []).forEach(p => {
    if (APP.tollAssignments && APP.tollAssignments[p.id]) {
      totalTollsAllCompanies += Math.abs(p.amount);
    }
  });
  if (selectedInvoice && selectedInvoice.tolls) {
    selectedInvoice.tolls.forEach(e => {
      if (e.category !== 'Toll Deduction') return;
      let cid = e._assignedCompanyId;
      if (!cid && e.driver) {
        const reg = findDriverByName(e.driver);
        if (reg) cid = reg.companyId;
      }
      if (!cid && e.tractor) {
        const tc = findCompanyByTractor(e.tractor);
        if (tc) cid = tc.id;
      }
      if (cid) totalTollsAllCompanies += Math.abs(e.amount);
    });
  }
  // Total per-block deduction (sum across all companies for this invoice)
  let totalPerBlockAllCompanies = 0;
  let totalMiscFeeAllCompanies = 0;
  (selectedInvoice?.trips || []).forEach(t => {
    let compId = null;
    if (findCompanyByTractor(t.tractor)) compId = findCompanyByTractor(t.tractor).id;
    if (!compId && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg) compId = reg.companyId;
    }
    if (!compId) return;
    const comp = APP.companies.find(c => c.id === compId);
    if (!comp || comp.isOwner) return;
    totalPerBlockAllCompanies += (comp.perBlockDeduction || 0);
  });
  // Misc fee is per company, not per block, so just sum unique companies
  const seenCompaniesForMisc = new Set();
  (selectedInvoice?.trips || []).forEach(t => {
    let compId = null;
    if (findCompanyByTractor(t.tractor)) compId = findCompanyByTractor(t.tractor).id;
    if (!compId && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg) compId = reg.companyId;
    }
    if (!compId || seenCompaniesForMisc.has(compId)) return;
    seenCompaniesForMisc.add(compId);
    const comp = APP.companies.find(c => c.id === compId);
    if (!comp || comp.isOwner) return;
    totalMiscFeeAllCompanies += (comp.miscFee || 0);
  });
  
  const totalFinalPagar = totalNet - totalTollsAllCompanies - totalPerBlockAllCompanies - totalMiscFeeAllCompanies;

  return `
    <div class="view-header">
      <div>
        <h1 class="view-title" data-i18n="nav.payroll">💰 Payroll</h1>
        <p class="view-subtitle" data-i18n="pay.subtitle">Cálculo del pago de la semana actual${selectedInvoice ? ' — ' + escapeHtml(selectedInvoice.label) : ''}</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="exportReportExcel()">📊 Excel</button>
        <button class="btn btn-secondary" onclick="exportReportPDF()">📄 PDF</button>
        <button class="btn btn-secondary" onclick="exportReportCSV()">📋 CSV</button>
      </div>
    </div>

    ${(activeInvoices.length > 0 || paidInvoices.length > 0) ? `
      <div class="card" style="background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border-left: 4px solid var(--blue);">
        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
          <div style="font-size: 13px; font-weight: 600;" data-i18n="pay.week_label">📅 Semana a pagar:</div>
          <select id="payrollInvoiceSelect" onchange="selectPayrollInvoice(this.value)" style="flex: 1; min-width: 200px; max-width: 400px; padding: 8px; border-radius: 6px; border: 1px solid var(--blue); background: white; font-size: 13px;">
            ${activeInvoices.length > 0 ? `<optgroup label="${t('pay.active_label')}" data-i18n="pay.active_label">${activeInvoices.map(i => `<option value="${i.id}" ${i.id === selectedInvoiceId ? 'selected' : ''}>${escapeHtml(i.label)} (${fmtDate(i.rangeStart)} → ${fmtDate(i.rangeEnd)})</option>`).join('')}</optgroup>` : ''}
            ${paidInvoices.length > 0 ? `<optgroup label="${t('pay.archived_label')}" data-i18n="pay.archived_label">${paidInvoices.map(i => `<option value="${i.id}" ${i.id === selectedInvoiceId ? 'selected' : ''}>${escapeHtml(i.label)} (${fmtDate(i.rangeStart)} → ${fmtDate(i.rangeEnd)})</option>`).join('')}</optgroup>` : ''}
          </select>
          <button class="btn btn-sm btn-secondary" onclick="navigate('archive')" data-i18n-title="pay.archive_full" title="Ver historial completo">📚 <span data-i18n="pay.archive_history">Historial de Pagos</span></button>
          ${activeInvoices.length > 0 ? `<span class="badge badge-success" style="font-size: 11px;">${activeInvoices.length} <span data-i18n="pay.active_count">activa(s)</span></span>` : ''}
        </div>
      </div>
    ` : ''}

    <div class="stats-grid-4">
      <div class="stat-card"><div class="label" data-i18n="pay.trips">🚛 Viajes</div><div class="value">${allTrips.length}</div></div>
      <div class="stat-card navy"><div class="label" data-i18n="pay.miles">📏 Millas</div><div class="value">${totalMiles.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label" data-i18n="pay.gross">💰 Revenue</div><div class="value">${moneyShort(totalGross)}</div></div>
      <div class="stat-card gold" style="background: linear-gradient(135deg, #fef3c7, #fde68a); border-left: 4px solid var(--warning);">
        <div class="label" data-i18n="pay.my_commission">⭐ Mi Comisión</div>
        <div style="display: flex; flex-direction: column; gap: 2px; margin-top: 4px; font-size: 12px; font-weight: 600;">
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span style="color: var(--text-light);">Tu comisión (10%):</span>
            <span class="money-mine" style="color: var(--orange); font-weight: 700;">${moneyShort(totalComm)}</span>
          </div>
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span style="color: var(--text-light);">−Pago/Bloque:</span>
            <span style="color: var(--danger); font-weight: 700;">−${moneyShort(totalPerBlockAllCompanies)}</span>
          </div>
          <div style="display: flex; justify-content: space-between; gap: 8px;">
            <span style="color: var(--text-light);">−Misc Fee:</span>
            <span style="color: var(--danger); font-weight: 700;">−${moneyShort(totalMiscFeeAllCompanies)}</span>
          </div>
        </div>
      </div>
      <div class="stat-card green"><div class="label" data-i18n="pay.to_companies">💼 A Empresas (Neto)</div><div class="value money-positive">${moneyShort(totalNet)}</div></div>
      <div class="stat-card" style="background: linear-gradient(135deg, #fee, #fdd); border-left: 4px solid var(--danger);"><div class="label" data-i18n="pay.tolls_debit">🛣️ Débitos Tolls</div><div class="value" style="color: var(--danger);">−${moneyShort(totalTollsAllCompanies)}</div></div>
      <div class="stat-card" style="background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-left: 4px solid var(--success);"><div class="label" data-i18n="pay.final">💰 FINAL A PAGAR</div><div class="value" style="color: var(--success);">${moneyShort(totalFinalPagar)}</div></div>
    </div>

    <div class="tabs">
      <div class="tab active" data-i18n="pay.tab_company">🏢 Por Compañía</div>
      <button class="btn btn-secondary" style="margin-left: auto;" onclick="navigate('myCompany')">🏠 <span data-i18n="pay.go_my_company">Ir a Mi Compañía</span></button>
    </div>

    <div class="card">
      ${renderPayrollByCompany(payrollByCompany, totalComm, selectedInvoice, totalFinalPagar, totalTollsAllCompanies)}
    </div>

    ${renderCompanyInvoicesSection(allTrips)}
    ${renderCompanyPaymentHistory()}
  `;
}

              <div>−<span data-i18n="pay.misc_fee">Misc Fee</span></div>
              <input type="number" id="globalMiscFee" data-i18n-placeholder="pay.apply_all" placeholder="Aplicar a todas"
                min="0" step="0.01" style="width: 80px; margin-top: 4px; padding: 2px; font-size: 11px;"
                onchange="applyGlobalDeduction('miscFee', this.value)"
                title="Escribe un monto y presiona Enter para aplicarlo a TODAS las empresas">
              <div style="font-size: 9px; color: var(--text-light); margin-top: 2px;">→ <span data-i18n="pay.all">todas</span></div>
            </th>
            <th class="text-right" data-i18n="pay.final">💰 Final a Pagar</th>
          </tr>
        </thead>
        <tbody>
          ${payrollByCompany.map(c => {
            // Use per-company commissionPct
            const compObj = APP.companies.find(co => co.name === c.companyName);
            const pct = compObj && compObj.commissionPct != null ? compObj.commissionPct : (APP.settings.commissionPct || 10);
            const comm = c.grossRevenue * (pct / 100);
            const neto = c.grossRevenue - comm;
            // Calculate toll deductions for this company
            let tollsForCompany = 0;
            if (APP.currentInvoicePreview && APP.currentInvoicePreview.payanoResult) {
              (APP.currentInvoicePreview.payanoResult.expenses || []).forEach(e => {
                if (e.category !== 'Toll Deduction') return;
                let cid = e._assignedCompanyId;
                if (!cid && e.driver) {
                  const reg = findDriverByName(e.driver);
                  if (reg) cid = reg.companyId;
                }
                if (!cid && e.tractor) {
                  const tc = findCompanyByTractor(e.tractor);
                  if (tc) cid = tc.id;
                }
                if (cid === compObj?.id) tollsForCompany += Math.abs(e.amount);
              });
            }
            if (selectedInvoice && selectedInvoice.tolls) {
              selectedInvoice.tolls.forEach(e => {
                if (e.category !== 'Toll Deduction') return;
                let cid = e._assignedCompanyId;
                if (!cid && e.driver) {
                  const reg = findDriverByName(e.driver);
                  if (reg) cid = reg.companyId;
                }
                if (!cid && e.tractor) {
                  const tc = findCompanyByTractor(e.tractor);
                  if (tc) cid = tc.id;
                }
                if (cid === compObj?.id) tollsForCompany += Math.abs(e.amount);
              });
            }
            (APP.pendingTolls || []).forEach(p => {
              let cid = null;
              if (APP.tollAssignments && APP.tollAssignments[p.id]) cid = APP.tollAssignments[p.id];
              if (cid === compObj?.id) tollsForCompany += Math.abs(p.amount);
            });
            // Get per-block deduction and misc fee (editable per company)
            const perBlockDed = (compObj && compObj.perBlockDeduction) || 0;
            const blocksCount = c.blockCount || 0;
            const totalPerBlock = perBlockDed * blocksCount;
            const miscFee = (compObj && compObj.miscFee) || 0;
            const finalPay = neto - tollsForCompany - totalPerBlock - miscFee;
            return `
            <tr>
              <td><b>${escapeHtml(c.companyName)}</b>${pct !== 10 ? `<br><small style="color: var(--text-light);">${pct}%</small>` : ''}</td>
              <td class="text-right">${c.driverCount}</td>
              <td class="text-right">${c.tractorCount}</td>
              <td class="text-right">${blocksCount}</td>
              <td class="text-right">${c.totalMiles.toFixed(1)}</td>
              <td class="text-right money">${money(c.grossRevenue)}</td>
              <td class="text-right money money-mine">−${money(comm)}</td>
              <td class="text-right money money-positive">${money(neto)}</td>
              <td class="text-right" style="color: ${tollsForCompany > 0 ? 'var(--danger)' : 'var(--text-light)'};">${tollsForCompany > 0 ? '−' + money(tollsForCompany) : '—'}</td>
              <td class="text-right" style="color: var(--warning);">
                <input type="number" class="deduct-input" data-company-id="${compObj?.id}" data-field="perBlockDeduction" value="${perBlockDed}" min="0" step="0.01" style="width: 70px; padding: 2px; font-size: 12px;" onchange="updateCompanyDeduction(this)" placeholder="$/bloque">
                <br><small style="color: var(--text-light); font-size: 10px;">${blocksCount} bloq × $${perBlockDed.toFixed(2)} = −${money(totalPerBlock)}</small>
              </td>
              <td class="text-right" style="color: var(--warning);">
                <input type="number" class="deduct-input" data-company-id="${compObj?.id}" data-field="miscFee" value="${miscFee}" min="0" step="0.01" style="width: 80px; padding: 2px; font-size: 12px;" onchange="updateCompanyDeduction(this)" placeholder="$ misc">
                ${miscFee > 0 ? `<br><small style="color: var(--text-light); font-size: 10px;">−${money(miscFee)}</small>` : ''}
              </td>
              <td class="text-right money" style="font-weight: 700; color: var(--success);">${money(finalPay)}</td>
            </tr>
            `;
          }).join('')}
          <tr class="total-row">
            <td>TOTAL</td>
            <td class="text-right">${payrollByCompany.reduce((s, c) => s + c.driverCount, 0)}</td>
            <td class="text-right">${payrollByCompany.reduce((s, c) => s + c.tractorCount, 0)}</td>
            <td class="text-right">${payrollByCompany.reduce((s, c) => s + c.blockCount, 0)}</td>
            <td class="text-right">${payrollByCompany.reduce((s, c) => s + c.totalMiles, 0).toFixed(1)}</td>
            <td class="text-right money">${money(payrollByCompany.reduce((s, c) => s + c.grossRevenue, 0))}</td>
            <td class="text-right money money-mine">−${money(payrollByCompany.reduce((s, c) => {
              const compObj = APP.companies.find(co => co.name === c.companyName);
              const pct = compObj && compObj.commissionPct != null ? compObj.commissionPct : (APP.settings.commissionPct || 10);
              return s + c.grossRevenue * (pct / 100);
            }, 0))}</td>
            <td class="text-right money money-positive">${money(payrollByCompany.reduce((s, c) => {
              const compObj = APP.companies.find(co => co.name === c.companyName);
              const pct = compObj && compObj.commissionPct != null ? compObj.commissionPct : (APP.settings.commissionPct || 10);
              return s + c.grossRevenue * (1 - pct / 100);
            }, 0))}</td>
            <td class="text-right" style="color: var(--danger);">−${money(totalTollsAllCompanies || 0)}</td>
            <td class="text-right" style="color: var(--warning);">−${money(payrollByCompany.reduce((s, c) => {
              const compObj = APP.companies.find(co => co.name === c.companyName);
              if (!compObj) return s;
              const perBlock = compObj.perBlockDeduction || 0;
              return s + perBlock * (c.blockCount || 0);
            }, 0))}</td>
            <td class="text-right" style="color: var(--warning);">−${money(payrollByCompany.reduce((s, c) => {
              const compObj = APP.companies.find(co => co.name === c.companyName);
              if (!compObj) return s;
              return s + (compObj.miscFee || 0);
            }, 0))}</td>
            <td class="text-right money" style="font-weight: 700; color: var(--success);">${money(totalFinalPagar)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
}

// Update company deduction (per-block or misc fee)
function updateCompanyDeduction(input) {
  const companyId = input.dataset.companyId;
  const field = input.dataset.field;
  const value = Number(input.value) || 0;
  const comp = APP.companies.find(c => c.id === companyId);
  if (!comp) return;
  comp[field] = value;
  saveCompanies();
  // Re-render the view (reflects in PDFs of company invoices automatically)
  refreshCurrentView();
  toast(`✅ Deducción guardada para ${comp.name}. Se refleja en la factura final.`, 'success');
}

// Apply a deduction to ALL companies at once (from the global input in the table header)
function applyGlobalDeduction(field, value) {
  const v = Number(value);
  if (isNaN(v) || v < 0) {
    toast('Monto inválido', 'error');
    return;
  }
  // Apply to all companies (except owner)
  let count = 0;
  APP.companies.forEach(c => {
    if (c.isOwner) return; // Skip owner company
    c[field] = v;
    count++;
  });
  saveCompanies();
  refreshCurrentView();
  toast(`✅ ${field === 'perBlockDeduction' ? 'Pago por Bloque' : 'Misc Fee'} de $${v.toFixed(2)} aplicado a ${count} empresas. Se refleja en cada factura final.`, 'success');
}

    if (!byCategory[e.category]) byCategory[e.category] = { count: 0, total: 0, items: [] };
    byCategory[e.category].count++;
    byCategory[e.category].total += e.amount;
    byCategory[e.category].items.push(e);

                  </td>

  `;
}

/**
 * Render Exception Report — trips and expenses that couldn't be assigned to a company
 * Must be resolved manually before closing payroll
 */
function renderExceptionReport(preview) {
  if (!preview) return '';
  const inRange = preview.inRange || [];
  const expenses = preview.payanoResult?.expenses || [];

  // Find UNASSIGNED trips
  const unassignedTrips = inRange.filter(t => {
    if (!t.pay || t.pay === 0) return false; // Skip $0 trips
    let comp = findCompanyByTractor(t.tractor);
    if (t.tractor && APP.pendingTractorAssignments && APP.pendingTractorAssignments[t.tractor]) {
      comp = APP.companies.find(x => x.id === APP.pendingTractorAssignments[t.tractor]);
    }
    if (!comp && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg && reg.companyId) {
        const driverComp = APP.companies.find(x => x.id === reg.companyId);
        if (driverComp) {
          if (!driverComp.tractors || driverComp.tractors.length === 0) comp = driverComp;
          else if (t.tractor && driverComp.tractors.map(x => x.toLowerCase()).includes(t.tractor.toLowerCase())) comp = driverComp;
        }
      }
    }
    return !comp;
  });

  // Find UNASSIGNED expenses (no driver match)
  const unassignedExpenses = expenses.filter(e => !e.driver);

  if (unassignedTrips.length === 0 && unassignedExpenses.length === 0) {
    return `

      </div>

  return `

function confirmAssignException(tripKey) {
  const companyId = document.getElementById('assignExceptionCompany').value;
  const company = APP.companies.find(c => c.id === companyId);
  if (!company) return;
  
  if (!APP.exceptionOverrides) APP.exceptionOverrides = {};
  APP.exceptionOverrides[tripKey] = companyId;
  
  // Update preview trip
  const trip = APP.currentInvoicePreview.inRange.find(t => 
    t.primaryKey === tripKey || t.blockId === tripKey || t.tripId === tripKey
  );
  if (trip) trip._assignedCompanyId = companyId;
  
  closeModal();
  toast(`✅ ${tripKey} → ${company.name}`, 'success');
  renderInvoiceStep3(); // re-render
}

      let comp = findCompanyByTractor(t.tractor);
      if (!comp && t.driver) {

        if (reg && reg.companyId) {
          comp = APP.companies.find(c => c.id === reg.companyId);

/* ====================================================================
   PART 16: PAYANO PAYROLL ENGINE v2.0  🚛 SELLADO — NO TOCAR 🚛
   ==================================================================== */
/*
   ⚠️  ADVERTENCIA: Este motor está SELLADO por orden del usuario.
   Cualquier cambio requiere permiso explícito.
   
   REGLAS OBLIGATORIAS (Amazon Relay real):
   1. Agrupar por Block ID
   2. Usar SOLO la tarifa principal (MAX estimated cost) del bloque
   3. Excluir bloques del último día del período (mover a pendientes)
   4. Excluir bloques diferidos ("next invoice", "future settlement", etc.)
   5. Mostrar conciliación Calculado vs Esperado, alerta si diff > 1%
   6. Driver → Company matching
*/

// 16 driver→company mappings provided (defined in 02_state.js)
// const PAYANO_DEFAULT_DRIVER_COMPANIES = { ... };

const PAYANO_DEFERRED_PATTERNS = [
  /scheduled\s*to\s*be\s*paid\s*next\s*invoice/i,
  /will\s*be\s*paid\s*next\s*invoice/i,
  /future\s*settlement/i,
  /to\s*be\s*paid\s*next/i,
  /next\s*invoice/i,
  /pending\s*settlement/i,
  /deferred\s*payment/i,
  /next\s*payment\s*cycle/i,
];

const PAYANO_CANCELLED_PATTERNS = [
  /^cancelled?$/i,
  /^canceled$/i,
  /\bcancel(led|ed)?\b/i,
  /^rejected?$/i,
  /\breject(ed)?\b/i,
];

/**
 * STEP 1 of Payano Engine: Group rows by Block ID, take MAX cost
 * Returns: { blocks: [...], ungroupedRows: [...] }
 *   each block = { blockId, maxRow, allRows, grossRevenue }
 */
/**
 * PAYANO v2.1: DUAL REVENUE MODEL
 *
 * Two different revenue structures from Amazon Relay:
 *
 * MODEL 1 - BLOCK PAYMENTS (Block ID starts with "B-")
 *   - Group by Block ID
 *   - Use ONLY the highest amount (MAX)
 *   - Example: B-C6JLSRT20 with $2,840.56, $346.97, $33.78 -> $2,840.56
 *
 * MODEL 2 - LOAD/TRIP PAYMENTS (Block ID does NOT start with "B-")
 *   - Group by Trip ID
 *   - Sum ALL amounts (SUM)
 *   - Example: T-1114774HZ with $377.54 + $69.41 + $886.14 -> $1,333.09
 *
 * Detection: if Block ID starts with "B-" -> BLOCK model, else -> LOAD model
 */
function payanoGroupItems(rows, colMap) {
  const groups = {};        // key -> group
  const ungroupedRows = []; // truly orphan rows
  const warnings = [];      // multi-driver warnings
  const amazonData = (typeof APP !== 'undefined' && APP.amazonInvoiceData) || null;

  rows.forEach((row, idx) => {
    const blockId = colMap.colBlock ? String(row[colMap.colBlock] || '').trim() : '';
    const tripId = colMap.colTrip ? String(row[colMap.colTrip] || '').trim() : '';
    // PAYANO RULE: "DriverA;DriverA" = same person. "DriverA;DriverB" = 2 people.
    const drv = normalizePayanoDriverName(String(row[colMap.colDriver] || '').trim());
    const pay = parseMoney(row[colMap.colPay]);
    const stage = String(row[colMap.colStage] || '').trim();

    // Detect revenue model
    // RULE: If ID starts with "B-" → BLOCK (MAX). Otherwise → LOAD (SUM).
    // LOAD key can come from: Trip ID column, OR the Block ID column (if it has a non-B- value)
    let groupKey, groupType;
    if (blockId && blockId.toUpperCase().startsWith('B-')) {
      // MODEL 1: BLOCK (B-XXXXXXXX) — Amazon pays the BLOCK as a unit, MAX of all rows
      groupKey = blockId;
      groupType = 'BLOCK';
    } else if (tripId) {
      // MODEL 2: LOAD — Trip ID column has data (T-XXX, 112CVMP7Y, etc.)
      groupKey = tripId;
      groupType = 'LOAD';
    } else if (blockId) {
      // Block ID column has a non-B- value (e.g. "112CVMP7Y", "T-115TDNWXT") → treat as LOAD
      groupKey = blockId;
      groupType = 'LOAD';
    } else {
      // Truly orphan: no block and no trip
      ungroupedRows.push({ row, idx });
      return;
    }

    if (!groups[groupKey]) {
      groups[groupKey] = {
        key: groupKey,
        type: groupType,
        blockId: groupType === 'BLOCK' ? blockId : '',
        tripId: groupType === 'LOAD' ? tripId : '',
        rows: [],
        drivers: new Set(),
        totalPay: 0,        // SUM (only meaningful for LOADs)
        maxPay: -Infinity,  // MAX (only meaningful for BLOCKs)
        maxRow: null,       // row with the max amount
        primaryRow: null,   // canonical row (for driver/tractor/etc.)
        primaryKey: groupKey,
      };
    }
    const g = groups[groupKey];
    g.rows.push({ row, idx });
    g.totalPay += pay;
    if (drv) g.drivers.add(drv);
    if (pay > g.maxPay) {
      g.maxPay = pay;
      g.maxRow = row;
    }
  });

  // Compute final revenue per group based on its type
  Object.values(groups).forEach(g => {
    if (g.type === 'BLOCK') {
      g.grossRevenue = g.maxPay;  // MAX
      g.primaryRow = g.maxRow;    // for driver/tractor/date: from max row
      g.calculationMethod = 'MAX';
    } else {
      g.grossRevenue = g.totalPay; // SUM
      // For LOAD: use the FIRST row as primary (or maxPay row, doesn't matter)
      g.primaryRow = g.rows[0]?.row || g.maxRow;
      g.calculationMethod = 'SUM';
    }
    g.allRowsCount = g.rows.length;
    g.driverCount = g.drivers.size;
    g.driversList = Array.from(g.drivers);

    // Count how many rows each driver has in this group
    const driverCounts = {};
    g.rows.forEach(item => {
      const d = normalizePayanoDriverName(String(item.row[colMap.colDriver] || '').trim());
      if (d) driverCounts[d] = (driverCounts[d] || 0) + 1;
    });
    g.driverCounts = driverCounts;

    // Rule: 1 Group ID = 1 Driver = 1 Company
    // If a LOAD group has multiple drivers (e.g. T-1141QWPRR has Randy + Pedro),
    // Amazon doesn't merge pays — Randy's rows go to his company, Pedro's to his.
    // We FLAG this for the user but DON'T auto-split the money (we use totalPay).
    if (g.driverCount > 1) {
      warnings.push({
        type: 'multi_driver_group',
        groupKey: g.key,
        groupType: g.type,
        drivers: g.driversList,
        driverCounts: driverCounts,
        rowCount: g.allRowsCount,
        message: 'WARNING: ' + g.type + ' ID ' + g.key + ' assigned to ' + g.driverCount + ' drivers. Manual review required.',
      });
    }
  });

  // Subdivide LOAD groups that have multiple drivers.
  // Per Payano rule: 1 Group ID = 1 Driver = 1 Company.
  // When a Trip ID spans multiple drivers (e.g. T-1141QWPRR with Randy + Pedro),
  // Amazon pays each driver separately. We split the group so the money goes
  // to the right company, with each sub-group SUM-ing its own driver's pay.
  const finalGroups = [];
  Object.values(groups).forEach(g => {
    if (g.type === 'LOAD' && g.driverCount > 1) {
      // Build per-driver sub-groups
      const perDriver = {};
      g.rows.forEach(item => {
        const d = normalizePayanoDriverName(String(item.row[colMap.colDriver] || '').trim());
        if (!d) return;
        if (!perDriver[d]) {
          perDriver[d] = { ...g, rows: [], totalPay: 0, maxPay: -Infinity, maxRow: null, drivers: new Set(), driverCounts: {} };
        }
        perDriver[d].rows.push(item);
        const p = parseMoney(item.row[colMap.colPay]);
        perDriver[d].totalPay += p;
        perDriver[d].drivers.add(d);
        perDriver[d].driverCounts[d] = (perDriver[d].driverCounts[d] || 0) + 1;
        if (p > perDriver[d].maxPay) {
          perDriver[d].maxPay = p;
          perDriver[d].maxRow = item.row;
        }
      });
      // For multi-driver trips: store the original key on each sub-group.
      // The actual invoice total assignment is done in payanoBuildTrips,
      // where we have clearer driver-order tracking.
      let firstDriver = null;
      g.rows.forEach(item => {
        if (firstDriver) return;
        const d = normalizePayanoDriverName(String(item.row[colMap.colDriver] || '').trim());
        if (d) firstDriver = d;
      });
      // Track order of drivers as they appear
      const driverOrder = [];
      g.rows.forEach(item => {
        const d = normalizePayanoDriverName(String(item.row[colMap.colDriver] || '').trim());
        if (d && !driverOrder.includes(d)) driverOrder.push(d);
      });
      Object.entries(perDriver).forEach(([drv, sub]) => {
        sub.originalKey = g.key;
        sub.key = g.key + '|' + drv;
        sub.primaryKey = g.key;
        sub.driver = drv;
        sub.primaryRow = sub.maxRow || sub.rows[0].row;
        sub.driverCount = 1;
        sub.driversList = [drv];
        sub.allRowsCount = sub.rows.length;
        sub.grossRevenue = sub.totalPay;
        sub.calculationMethod = 'SUM';
        sub.splitFromMultiDriver = true;
        sub.isFirstDriver = (driverOrder[0] === drv);
        finalGroups.push(sub);
      });
    } else {
      finalGroups.push(g);
    }
  });

  return {
    groups: finalGroups,
    ungroupedRows,
    multiDriverWarnings: warnings,
    stats: {
      totalBlockGroups: finalGroups.filter(g => g.type === 'BLOCK').length,
      totalLoadGroups: finalGroups.filter(g => g.type === 'LOAD').length,
    },
  };
}

// Backward-compat alias (old name still used by the rest of the engine)
function payanoGroupByBlock(rows, colMap) {
  const result = payanoGroupItems(rows, colMap);
  return {
    blocks: result.groups,  // each group has .type (BLOCK or LOAD)
    ungroupedRows: result.ungroupedRows,
    multiDriverWarnings: result.multiDriverWarnings,
  };
}

/**
 * STEP 2: Classify blocks (in-period, deferred, cancelled, last-day, out-of-range)
 */
function payanoClassifyBlocks(blocks, rangeStart, rangeEnd, colMap) {
  const inPeriod = [];
  const lastDayExcluded = []; // blocks whose arrival date == rangeEnd (toggle OFF by default)
  const deferred = [];         // "next invoice" etc.
  const cancelled = [];        // cancelled/rejected
  const beforeRange = [];      // finished before rangeStart
  const afterRange = [];       // finished after rangeEnd but not exactly last day

  // PAYANO SETTINGS (configurable via Settings > Reglas del Motor Payano)
  const dateColumn = (typeof APP !== 'undefined' && APP.settings && APP.settings.payanoDateColumn) || 'stop1';
  const cutoffTime = (typeof APP !== 'undefined' && APP.settings && APP.settings.payanoCutoffTime) || '00:00';
  const lastDayToNextWeek = !!(typeof APP !== 'undefined' && APP.settings && APP.settings.payanoLastDayToNextWeek);
  const includeZeroPay = !!(typeof APP !== 'undefined' && APP.settings && APP.settings.payanoIncludeZeroPay);

  // Convert to Date objects
  const startDate = new Date(rangeStart);
  startDate.setHours(0, 0, 0, 0);
  const endDate = new Date(rangeEnd);
  endDate.setHours(23, 59, 59, 999);

  // For "last day" comparison, use the end day (without time)
  const endDayOnly = new Date(endDate);
  endDayOnly.setHours(0, 0, 0, 0);

  // Parse cutoff time
  const [cutoffH, cutoffM] = cutoffTime.split(':').map(Number);

  // PAYANO DEFINITIVE RULE: If a Block/Trip is in an Amazon invoice, ALWAYS include it
  // regardless of date range or stage. Amazon's invoice is the gold standard.
  const amazonData = (typeof APP !== 'undefined' && APP.amazonInvoiceData) || null;
  const isInInvoice = (blockId) => {
    if (!amazonData) return false;
    if (amazonData.blocks[blockId]) return true;
    if (amazonData.trips[blockId]) return true;
    return false;
  };
  blocks.forEach(block => {
    if (!block.maxRow) return;
    const stage = String(block.maxRow[colMap.colStage] || '').trim();
    const blockId = block.blockId;
    const pay = block.grossRevenue;
    const inInvoice = isInInvoice(blockId);

    // If in invoice, always include (unless it's literally $0 which means it's just an adjustment)
    if (inInvoice && pay !== 0) {
      inPeriod.push({ block, reason: 'En Amazon invoice', stage, inInvoice: true });
      return;
    }

    // Rule 4: Deferred patterns
    if (PAYANO_DEFERRED_PATTERNS.some(p => p.test(stage))) {
      deferred.push({ block, reason: `"${stage}" — pago diferido`, stage });
      return;
    }

    // Cancelled / rejected (per user spec: if Amazon paid TONU, include it)
    if (PAYANO_CANCELLED_PATTERNS.some(p => p.test(stage))) {
      if (pay > 0) {
        // Include: Amazon paid TONU (Turn Or Not Used) — even if cancelled
        // We keep the block in inPeriod
      } else {
        cancelled.push({ block, reason: `"${stage}"`, stage });
        return;
      }
    }

    // $0 blocks (configurable)
    if (pay === 0 && !includeZeroPay) {
      cancelled.push({ block, reason: 'Pago $0', stage });
      return;
    }

    // Get the date for assignment - use either Stop 1 (default) or Stop 2 (Amazon official)
    let arrivalDate = null;
    if (dateColumn === 'stop2') {
      // Use Stop 2 Actual Departure Date + Time
      const findCol = (name) => {
        const target = name.toLowerCase().replace(/\s+/g, ' ').trim();
        for (const k of Object.keys(block.maxRow)) {
          if (k.toLowerCase().replace(/\s+/g, ' ').trim() === target) return block.maxRow[k];
        }
        return '';
      };
      const stop2DateStr = findCol('Stop 2 Actual Departure Date') || findCol('Stop 2  Actual Departure Date');
      const stop2TimeStr = findCol('Stop 2 Actual Departure Time') || findCol('Stop 2  Actual Departure Time');
      if (stop2DateStr) {
        arrivalDate = parseDate(stop2DateStr);
        if (arrivalDate && stop2TimeStr) {
          const t = String(stop2TimeStr).match(/^(\d{1,2}):(\d{2})/);
          if (t) {
            // Convert Pacific Time to local. The CSV is typically in PT for Amazon Relay.
            arrivalDate.setHours(+t[1], +t[2], 0, 0);
          }
        }
      }
      // Fallback to colMap.colDate
      if (!arrivalDate) {
        arrivalDate = parseDate(block.maxRow[colMap.colDate]);
      }
    } else {
      arrivalDate = parseDate(block.maxRow[colMap.colDate]);
    }

    // No date
    if (!arrivalDate) {
      cancelled.push({ block, reason: 'Sin fecha', stage });
      return;
    }

    // Out of range checks
    if (arrivalDate < startDate) {
      beforeRange.push({ block, reason: 'Antes del rango', stage });
      return;
    }
    if (arrivalDate > endDate) {
      afterRange.push({ block, reason: 'Después del rango', stage });
      return;
    }

    // Rule 3: Last day of period (TOGGLE - OFF by default)
    if (lastDayToNextWeek) {
      const depDay = new Date(arrivalDate);
      depDay.setHours(0, 0, 0, 0);
      const isLastDay = depDay.getTime() === endDayOnly.getTime();
      if (isLastDay) {
        lastDayExcluded.push({ block, reason: 'Último día del período (mueve a la siguiente semana)', stage });
        return;
      }
    }

    // In period
    inPeriod.push({ block, reason: 'OK', stage });
  });

  return { inPeriod, lastDayExcluded, deferred, cancelled, beforeRange, afterRange };
}

/**
 * PAYANO RULE: Normalize driver name.
 * - If two parts joined by ';' are EXACTLY the same (or differ only by case/space), keep one.
 * - If they are DIFFERENT people, return them joined as-is for manual review (do NOT split revenue).
 *   Revenue stays with the Block ID / Trip ID — driver is informational.
 */


/**
 * STEP 3: Build trips for in-period groups (one trip per block/load).
 * For BLOCK: use MAX row as canonical (matches user spec).
 * For LOAD: use the LAST row by departure date as canonical row.
 */
function payanoBuildTrips(classified, colMap) {
  const useDominantDriver = !!(typeof APP !== 'undefined' && APP.settings && APP.settings.payanoUseDominantDriver);
  const amazonData = (typeof APP !== 'undefined' && APP.amazonInvoiceData) || null;
  return classified.inPeriod.map(({ group, block }) => {
    // Support new dual-model engine (group) and old (block)
    const g = group || block;
    const r = g.primaryRow || g.maxRow;
    const isLoad = g.type === 'LOAD';
    // PAYANO OPTION: if dominantDriver is enabled, use the driver with most rows
    let driverValue = String(r[colMap.colDriver] || '').trim();
    if (useDominantDriver && g.dominantDriver) {
      driverValue = g.dominantDriver;
    }
    // AMAZON INVOICE OVERRIDE: The invoice is the GOLD STANDARD.
    // We only pay what Amazon paid (Gross Pay from Payment Details).
    // The amazonPay structure consolidates all invoice types:
    //   - Main Invoice: base pay for the trip/block
    //   - Adjustment/Dispute/Credit/Debit: NET into the same key
    // (negative adjustments reduce the main pay)
    // Trips in CSV but NOT in any uploaded invoice get $0 (NO INVOICE FOUND).
    let grossRevenue = g.grossRevenue;
    let inInvoice = false;
    let invoiceNumber = '';
    let invoiceDate = '';
    // For multi-driver split groups, the FIRST driver (per CSV order) gets the
    // full invoice total; other sub-groups get 0 (per user's rule: 1 trip = 1 driver = 1 company)
    if (g.splitFromMultiDriver) {
      if (g.isFirstDriver && amazonData) {
        let invTotal = 0;
        if (amazonData.trips[g.originalKey || g.key]) invTotal = amazonData.trips[g.originalKey || g.key].total || 0;
        else if (amazonData.blocks[g.originalKey || g.key]) invTotal = amazonData.blocks[g.originalKey || g.key].total || 0;
        if (Math.abs(invTotal) > 0) {
          grossRevenue = invTotal;
          inInvoice = true;
          invoiceNumber = amazonData.trips[g.originalKey || g.key]?.invoiceNumber || amazonData.blocks[g.originalKey || g.key]?.invoiceNumber || '';
          invoiceDate = amazonData.trips[g.originalKey || g.key]?.invoiceDate || amazonData.blocks[g.originalKey || g.key]?.invoiceDate || '';
        } else {
          grossRevenue = 0;
        }
      } else {
        // Not the first driver — gets 0 from this trip
        grossRevenue = 0;
      }
    } else if (amazonData && (Object.keys(amazonData.trips || {}).length + Object.keys(amazonData.blocks || {}).length > 0)) {
      if (!isLoad && amazonData.blocks[g.key]) {
        const inv = amazonData.blocks[g.key];
        if (Math.abs(inv.total || 0) > 0) {
          grossRevenue = inv.total;
          inInvoice = true;
          invoiceNumber = inv.invoiceNumber || '';
          invoiceDate = inv.invoiceDate || '';
        }
      } else if (isLoad && amazonData.trips[g.originalKey || g.key]) {
        const inv = amazonData.trips[g.originalKey || g.key];
        if (Math.abs(inv.total || 0) > 0) {
          grossRevenue = inv.total;
          inInvoice = true;
          invoiceNumber = inv.invoiceNumber || '';
          invoiceDate = inv.invoiceDate || '';
        }
      } else {
        // Trip/Block in CSV but NOT in any uploaded invoice → NO INVOICE FOUND
        grossRevenue = 0;
      }
    }
    // For multi-driver split groups, use the ORIGINAL key (without driver suffix)
    const groupKey = g.originalKey || g.key;
    // Detect Amazon invoice override
    const isOverriddenByAmazon = (grossRevenue !== g.grossRevenue);
    const finalMethod = isOverriddenByAmazon ? (inInvoice ? 'INVOICE' : 'CSV') : g.calculationMethod;
    const trip = {
      driver: driverValue,
      pay: grossRevenue,
      payOriginal: g.grossRevenue,
      payOverridden: isOverriddenByAmazon,
      inInvoice: inInvoice,
      invoiceNumber: invoiceNumber,    // traceability
      invoiceDate: invoiceDate,
      noInvoiceFound: !inInvoice && amazonData && (Object.keys(amazonData.trips || {}).length + Object.keys(amazonData.blocks || {}).length > 0),
      contractId: String(r[colMap.colContract] || '').trim(),
      blockId: isLoad ? '' : groupKey,
      tripId: isLoad ? groupKey : '',
      primaryKey: groupKey,
      type: g.type,
      calculationMethod: finalMethod,
      tractor: String(r[colMap.colTractor] || '').trim().toUpperCase(),
      date: parseDate(r[colMap.colDate]) ? parseDate(r[colMap.colDate]).toISOString() : null,
      stage: String(r[colMap.colStage] || '').trim(),
      miles: colMap.colMiles ? parseFloat(String(r[colMap.colMiles] || '0').replace(/[^\d.]/g, '')) || 0 : 0,
      rowsCount: g.allRowsCount,
    };
    if (g.splitFromMultiDriver) trip.splitFromMultiDriver = true;
    if (isOverriddenByAmazon) trip.amazonInvoice = true;
    return trip;
  });
}

/**
 * STEP 3b: Add ORPHAN trips from Amazon invoice that are NOT in the CSV.
 * These are typically SPOT/Load Board trips (T- prefix or no prefix) that
 * Amazon paid but the user didn't include in their CSV.
 * Per user spec: Invoice = GOLD STANDARD, so we include ALL invoice trips.
 */
function payanoAddOrphanInvoiceTrips(csvTrips, amazonData, colMap) {
  if (!amazonData) return { trips: csvTrips, expenses: [] };
  // We also track expenses (tolls, credits, adjustments) separately from Gross Revenue
  const expenses = [];
  // Build a set of all primaryKeys already in CSV trips
  const existingKeys = new Set();
  csvTrips.forEach(t => {
    if (t.primaryKey) existingKeys.add(t.primaryKey);
    if (t.blockId) existingKeys.add(t.blockId);
    if (t.tripId) existingKeys.add(t.tripId);
  });
  
  // Build a lookup from tripId/loadId/blockId → driver/tractor (for orphan trips)
  const tripIdLookup = {};
  // Build a contractId → driver/tractor lookup (helps match toll adjustments by contract)
  const contractIdLookup = {};
  // Also build a route-based driver inference (e.g. AGS2->MGE5 is always same driver)
  const routeDriverLookup = {};
  // 0) FIRST: Scan all SAVED invoices for trips/blocks with drivers
  // This lets us match tolls to companies even when the original CSV is not loaded
  if (typeof APP !== 'undefined' && APP.invoices) {
    APP.invoices.forEach(inv => {
      (inv.trips || []).forEach(t => {
        const primaryKey = t.primaryKey || t.blockId || t.tripId;
        if (primaryKey && t.driver && !tripIdLookup[primaryKey]) {
          tripIdLookup[primaryKey] = { driver: t.driver, tractor: t.tractor || '' };
        }
        if (t.contractId && t.driver && !contractIdLookup[t.contractId]) {
          contractIdLookup[t.contractId] = { driver: t.driver, tractor: t.tractor || '' };
        }
      });
    });
  }
  if (typeof APP !== 'undefined' && APP.pendingFiles) {
    APP.pendingFiles.forEach(f => {
      (f.rows || []).forEach(r => {
        const blockId = String(r[colMap.colBlock] || '').trim();
        const tripId = String(r[colMap.colTrip] || '').trim();
        const loadId = String(r['Load ID'] || r['LoadID'] || r['loadId'] || r['load_id'] || '').trim();
        const contractId = String(r['Contract ID'] || r['ContractID'] || r['contractId'] || r['contract_id'] || '').trim();
        const driver = String(r[colMap.colDriver] || '').trim();
        const tractor = String(r[colMap.colTractor] || '').trim();
        const route = String(r['Facility Sequence'] || r['Domicile/Route'] || r['Route'] || r['route'] || '').trim();
        if (tripId && driver && !tripIdLookup[tripId]) tripIdLookup[tripId] = { driver, tractor };
        if (loadId && driver && !tripIdLookup[loadId]) tripIdLookup[loadId] = { driver, tractor };
        if (blockId && driver && !tripIdLookup[blockId]) tripIdLookup[blockId] = { driver, tractor };
        if (contractId && driver && !contractIdLookup[contractId]) contractIdLookup[contractId] = { driver, tractor };
        // Route-based: same route = same driver
        if (route && driver && !routeDriverLookup[route]) {
          routeDriverLookup[route] = { driver, tractor };
        }
      });
    });
  }

  // Also build lookup from MAIN INVOICE trips (Main + Load Board)
  // This catches trips that exist only in the invoice (not in CSV)
  // (amazonData is already a parameter — use it directly)
  if (amazonData) {
    Object.entries(amazonData.trips || {}).forEach(([tripId, t]) => {
      if (!tripIdLookup[tripId] && t.driver) {
        tripIdLookup[tripId] = { driver: t.driver, tractor: t.tractor || '' };
      }
      // Also build contractId lookup from invoice main trips
      if (t.contractId && !contractIdLookup[t.contractId] && t.driver) {
        contractIdLookup[t.contractId] = { driver: t.driver, tractor: t.tractor || '' };
      }
    });
    Object.entries(amazonData.blocks || {}).forEach(([blockId, t]) => {
      if (!tripIdLookup[blockId] && t.driver) {
        tripIdLookup[blockId] = { driver: t.driver, tractor: t.tractor || '' };
      }
    });
  }
  
  const orphanTrips = [];
  // Process invoice TRIPS (spot/load board)
  // Include: Main Invoice trips (positive pay) AND positive Debit Memo items
  // (per user rule: positive amounts = Gross Revenue, even from Debit Memos)
  Object.entries(amazonData.trips || {}).forEach(([tripId, inv]) => {
    if (existingKeys.has(tripId)) return; // Already in CSV
    
    const isMainInvoice = !inv.invoiceType || inv.invoiceType === 'Main Invoice';
    const isPositiveDebit = inv.invoiceType === 'Debit Memo' && Number(inv.total || 0) > 0;
    if (!isMainInvoice && !isPositiveDebit) return; // Skip negative adjustments/credits
    
    // Try to lookup driver/tractor: tripId first, then route-based
    const lookup = tripIdLookup[tripId] || routeDriverLookup[inv.route || ''] || {};
    const driver = lookup.driver || inv.driver || '';
    const tractor = lookup.tractor || inv.tractor || '';
    orphanTrips.push({
      driver: driver,
      pay: inv.total || 0,
      payOriginal: inv.total || 0,
      payOverridden: true,
      inInvoice: true,
      invoiceNumber: inv.invoiceNumber || '',
      invoiceDate: inv.invoiceDate || '',
      noInvoiceFound: false,
      contractId: inv.contractId || '',
      blockId: '',
      tripId: tripId,
      primaryKey: tripId,
      type: 'LOAD',
      calculationMethod: 'INVOICE-ORPHAN',
      tractor: String(tractor).trim().toUpperCase(),
      date: inv.date || null,
      stage: 'Completed',
      miles: 0,
      rowsCount: 0,
      orphanFromInvoice: true,
    });
  });
  
  // Process invoice BLOCKS not in CSV (rare)
  Object.entries(amazonData.blocks || {}).forEach(([blockId, inv]) => {
    if (existingKeys.has(blockId)) return;
    
    const isMainInvoice = !inv.invoiceType || inv.invoiceType === 'Main Invoice';
    const isPositiveDebit = inv.invoiceType === 'Debit Memo' && Number(inv.total || 0) > 0;
    if (!isMainInvoice && !isPositiveDebit) return;
    
    const lookup = tripIdLookup[blockId] || {};
    const driver = lookup.driver || inv.driver || '';
    const tractor = lookup.tractor || inv.tractor || '';
    orphanTrips.push({
      driver: driver,
      pay: inv.total || 0,
      payOriginal: inv.total || 0,
      payOverridden: true,
      inInvoice: true,
      invoiceNumber: inv.invoiceNumber || '',
      invoiceDate: inv.invoiceDate || '',
      noInvoiceFound: false,
      contractId: inv.contractId || '',
      blockId: blockId,
      tripId: '',
      primaryKey: blockId,
      type: 'BLOCK',
      calculationMethod: 'INVOICE-ORPHAN',
      tractor: String(tractor).trim().toUpperCase(),
      date: inv.date || null,
      stage: 'Completed',
      miles: 0,
      rowsCount: 0,
      orphanFromInvoice: true,
    });
  });
  
  return { trips: csvTrips.concat(orphanTrips), expenses, tripIdLookup, routeDriverLookup, contractIdLookup };
}

/**
 * STEP 3c: Extract EXPENSES from Amazon invoice (negative adjustments, tolls, credits).
 * These are tracked SEPARATELY from the company's Gross Revenue.
 * Categories:
 *   - 'Toll Deduction' (negative tolls — Amazon paid, bills company back)
 *   - 'Credit' (full credit memos)
 *   - 'Adjustment' (other negative adjustments, dispute adjustments)
 *   - 'Cancellation Fee' (positive cancellations like TONU — Amazon kept this as expense reimbursement)
 */
function payanoExtractExpenses(amazonData, tripIdLookup, routeDriverLookup, contractIdLookup) {
  if (!amazonData) return [];
  const expenses = [];
  
  // 1) Process all invoice files for line-item-level expenses
  (amazonData.allLineItems || []).forEach(li => {
    const itemType = String(li.item || '').toLowerCase();
    const gross = Number(li.gross || 0);
    
    // Filter: only negative items are expenses
    if (gross >= 0) return;
    
    // Categorize
    let category = 'Adjustment';
    let subType = itemType;
    if (/toll.*recover|trailer.*toll/i.test(itemType)) {
      // Toll Recovery is a DEDUCTION (Amazon paid a toll for our truck, bills us back)
      // NOT a credit. It should be debited from the company's amount-to-collect.
      category = 'Toll Deduction';
    } else if (/cancel/i.test(itemType) && Math.abs(gross) > 0) {
      category = 'Adjustment'; // Cancellations can be positive (TONU) or negative (clawback)
    }
    
    // Look up driver/company: try exact tripId, then strip T-/B- prefix, then contractId, then route
    const tripId = li.tripId || li.loadId || li.blockId;
    let lookup = tripIdLookup[tripId];
    if (!lookup && tripId) {
      const stripped = String(tripId).replace(/^[TB]-/, '');
      if (tripIdLookup[stripped]) lookup = tripIdLookup[stripped];
      else if (tripIdLookup['T-' + stripped]) lookup = tripIdLookup['T-' + stripped];
      else if (tripIdLookup['B-' + stripped]) lookup = tripIdLookup['B-' + stripped];
    }
    if (!lookup && li.contractId && contractIdLookup) lookup = contractIdLookup[li.contractId];
    if (!lookup) lookup = routeDriverLookup[li.route || ''] || {};
    const driver = lookup.driver || '';
    const tractor = lookup.tractor || '';
    
    expenses.push({
      invoiceNumber: li.invoiceNumber,
      invoiceDate: li.invoiceDate,
      carrier: li.carrier,
      blockId: li.blockId || '',
      tripId: li.tripId || '',
      loadId: li.loadId || '',
      contractId: li.contractId || '',
      itemType: li.item,
      category,
      subType,
      amount: gross, // negative
      absoluteAmount: Math.abs(gross),
      driver,
      tractor,
      route: li.route || '',
    });
  });
  
  // 2) Process invoice TRIPS that are adjustments/credits/debits
  // Rule (per user): positive amounts from any invoice are GROSS REVENUE.
  // Negative amounts are EXPENSES (Tolls, Credits, Adjustments).
  Object.entries(amazonData.trips || {}).forEach(([tripId, inv]) => {
    const total = Number(inv.total || 0);
    
    // Skip Main Invoice trips (those go to Gross)
    if (inv.invoiceType === 'Main Invoice') return;
    // Skip positive Debit Memo trips (they should be added as Gross orphans)
    if (total > 0) return;
    
    let category = 'Adjustment';
    // CHECK FOR TOLL FIRST — "Trailer Toll Recovery" is ALWAYS a DEDUCTION, never a credit
    // Even if it appears in a Credit Memo, it's still money the company owes back for tolls.
    if (/toll.*recover|trailer.*toll|toll/i.test(inv.itemType || '')) {
      category = 'Toll Deduction';
    } else if (inv.invoiceType === 'Credit Memo') {
      category = 'Credit';
    } else if (inv.invoiceType === 'Debit Memo') {
      category = 'Debit';
    }
    
    // Look up driver/company: try exact tripId, then strip T-/B- prefix, then contractId, then route
    let lookup = tripIdLookup[tripId];
    if (!lookup && tripId) {
      // Try without T- or B- prefix
      const stripped = String(tripId).replace(/^[TB]-/, '');
      if (tripIdLookup[stripped]) lookup = tripIdLookup[stripped];
      else if (tripIdLookup['T-' + stripped]) lookup = tripIdLookup['T-' + stripped];
      else if (tripIdLookup['B-' + stripped]) lookup = tripIdLookup['B-' + stripped];
    }
    if (!lookup && inv.contractId && contractIdLookup) lookup = contractIdLookup[inv.contractId];
    if (!lookup) lookup = routeDriverLookup[inv.route || ''] || {};
    const driver = inv.driver || lookup.driver || '';
    const tractor = inv.tractor || lookup.tractor || '';
    
    expenses.push({
      invoiceNumber: inv.invoiceNumber,
      invoiceDate: inv.invoiceDate,
      blockId: '',
      tripId,
      loadId: '',
      contractId: inv.contractId || '',
      itemType: inv.itemType || '',
      category,
      subType: inv.invoiceType,
      amount: total,
      absoluteAmount: Math.abs(total),
      driver,
      tractor,
      route: inv.route || '',
    });
  });
  
  // 3) Also process invoice BLOCKS that are pure adjustments
  Object.entries(amazonData.blocks || {}).forEach(([blockId, inv]) => {
    if (inv.invoiceType && inv.invoiceType === 'Main Invoice') return;
    const total = Number(inv.total || 0);
    
    let category = 'Adjustment';
    // Toll check FIRST — "Toll Recovery" is a DEDUCTION even if in Credit Memo
    if (/toll.*recover|trailer.*toll|toll/i.test(inv.itemType || '')) {
      category = 'Toll Deduction';
    } else if (inv.invoiceType === 'Credit Memo') {
      category = 'Credit';
    } else if (inv.invoiceType === 'Debit Memo') {
      category = 'Debit';
    }
    
    // Look up driver/company: try exact blockId, then strip B- prefix, then contractId
    let lookup = tripIdLookup[blockId];
    if (!lookup && blockId) {
      const stripped = String(blockId).replace(/^B-/, '');
      if (tripIdLookup[stripped]) lookup = tripIdLookup[stripped];
      else if (tripIdLookup['B-' + stripped]) lookup = tripIdLookup['B-' + stripped];
    }
    if (!lookup && inv.contractId && contractIdLookup) lookup = contractIdLookup[inv.contractId];
    const driver = lookup?.driver || '';
    const tractor = lookup?.tractor || '';
    
    expenses.push({
      invoiceNumber: inv.invoiceNumber,
      invoiceDate: inv.invoiceDate,
      blockId,
      tripId: '',
      loadId: '',
      contractId: inv.contractId || '',
      itemType: inv.itemType || '',
      category,
      subType: inv.invoiceType,
      amount: total,
      absoluteAmount: Math.abs(total),
      driver,
      tractor,
      route: '',
    });
  });
  
  return expenses;
}

/**
 * STEP 4: Match driver → company (DB-based, with fallback to default)
 */
function payanoMatchDriverToCompany(driverName) {
  if (!driverName) return null;
  const n = normalizeStr(driverName);

  // First, check user's driver database
  const registered = APP.drivers.find(d => normalizeStr(d.name) === n);
  if (registered && registered.companyId) {
    const comp = APP.companies.find(c => c.id === registered.companyId);
    if (comp) return comp;
  }

  // Fall back to tractor-based matching
  return null;
}

function payanoAssignCompany(trip) {
  // 1. Try driver → company
  const comp = payanoMatchDriverToCompany(trip.driver);
  if (comp) return comp;
  // 2. Try tractor → company
  return findCompanyByTractor(trip.tractor);
}

/**
 * STEP 5: Calculate payroll by driver + company
 */
function payanoCalculatePayroll(trips) {
  const byDriver = {};
  const byCompany = {};

  trips.forEach(t => {
    // Driver
    if (!byDriver[t.driver]) byDriver[t.driver] = { driver: t.driver, trips: 0, grossRevenue: 0, blocks: new Set() };
    byDriver[t.driver].trips++;
    byDriver[t.driver].grossRevenue += t.pay;
    byDriver[t.driver].blocks.add(t.blockId);

    // Company
    const comp = payanoAssignCompany(t);
    const compName = comp ? comp.name : '⚠️ Sin empresa';
    if (!byCompany[compName]) byCompany[compName] = { company: comp, drivers: new Set(), trips: 0, grossRevenue: 0, blocks: new Set() };
    byCompany[compName].trips++;
    byCompany[compName].grossRevenue += t.pay;
    byCompany[compName].blocks.add(t.blockId);
    if (t.driver) byCompany[compName].drivers.add(t.driver);
  });

  return { byDriver, byCompany };
}

/**
 * STEP 6: Conciliation
 *   If user provided an "expected" amount, compare.
 *   If diff > 1%, show alert.
 */
/**
 * Track tolls as "pending" so they persist across invoices.
 * A toll is PENDING if it can't be auto-assigned to a company.
 * It gets cleared when:
 *   1. User manually assigns it (sets _assignedCompanyId)
 *   2. The trip/block appears in a future invoice with clear owner
 */
function trackPendingTolls(expenses) {
  if (typeof APP === 'undefined') return;
  if (!APP.pendingTolls) APP.pendingTolls = [];
  
  // Load current pending tolls
  let pendingTolls = APP.pendingTolls;
  const now = new Date().toISOString();
  
  // Load manual assignments
  const manualAssignments = APP.tollAssignments || {};
  
  expenses.forEach(e => {
    if (e.category !== 'Toll Deduction') return;
    
    const key = `${e.invoiceNumber || 'X'}-${e.tripId || e.blockId || e.loadId || 'X'}`;
    
    // Try to identify the company
    let companyId = e._assignedCompanyId;
    
    // 1) Manual assignment (highest priority)
    if (!companyId && manualAssignments[key]) companyId = manualAssignments[key];
    
    // 2) Driver lookup
    if (!companyId && e.driver) {
      const reg = findDriverByName(e.driver);
      if (reg && reg.companyId) companyId = reg.companyId;
    }
    
    // 3) Tractor lookup
    if (!companyId && e.tractor) {
      const tc = findCompanyByTractor(e.tractor);
      if (tc) companyId = tc.id;
    }
    
    e._resolvedCompanyId = companyId || null;
    
    // If no company identified → add/update as pending
    if (!companyId) {
      const existing = pendingTolls.find(p => 
        p.invoiceNumber === e.invoiceNumber && 
        (p.tripId === e.tripId || p.blockId === e.blockId) &&
        Math.abs(p.amount - e.amount) < 0.01
      );
      if (existing) {
        // Update existing pending toll
        existing.lastSeenAt = now;
        existing.count = (existing.count || 1) + 1;
        existing.amount = e.amount; // Use latest
        existing.route = e.route || existing.route;
      } else {
        // New pending toll
        pendingTolls.push({
          id: key,
          invoiceNumber: e.invoiceNumber,
          invoiceDate: e.invoiceDate,
          tripId: e.tripId,
          blockId: e.blockId,
          loadId: e.loadId,
          contractId: e.contractId,
          route: e.route,
          driver: e.driver,
          tractor: e.tractor,
          amount: e.amount,
          itemType: e.itemType,
          status: 'PENDIENTE',
          addedAt: now,
          lastSeenAt: now,
          count: 1,
          weeksUnpaid: 0,
        });
      }
    } else {
      // Toll IS assigned — clear any pending entry with same key
      const idx = pendingTolls.findIndex(p => 
        p.invoiceNumber === e.invoiceNumber && 
        (p.tripId === e.tripId || p.blockId === e.blockId)
      );
      if (idx >= 0) {
        pendingTolls.splice(idx, 1);
      }
    }
  });
  
  // Increment weeksUnpaid for all pending tolls (weekly cycle)
  pendingTolls.forEach(p => {
    const lastSeen = new Date(p.lastSeenAt || p.addedAt || now);
    const daysSince = (Date.now() - lastSeen.getTime()) / (1000 * 60 * 60 * 24);
    if (daysSince > 7) {
      p.weeksUnpaid = (p.weeksUnpaid || 0) + 1;
      p.lastSeenAt = now;
    }
    // Mark as DISPUTA if older than 4 weeks
    if (p.weeksUnpaid >= 4) {
      p.status = 'DISPUTA';
    }
  });
  
  // Persist
  APP.pendingTolls = pendingTolls;
  localStorage.setItem('relaypay_pending_tolls', JSON.stringify(pendingTolls));
  
  // Attach pending tolls to the expense objects (so they show in the report)
  // Only attach ones from the CURRENT invoice processing
  expenses.forEach(e => {
    if (e.category === 'Toll Deduction') {
      const key = `${e.invoiceNumber || 'X'}-${e.tripId || e.blockId || e.loadId || 'X'}`;
      const pending = pendingTolls.find(p => p.id === key);
      if (pending) {
        e._pendingWeeks = pending.weeksUnpaid || 0;
        e._pendingStatus = pending.status || 'PENDIENTE';
      }
    }
  });
}

function payanoReconcile(calculatedGross, expectedGross) {
  if (!expectedGross || expectedGross <= 0) {
    return { diff: 0, diffPct: 0, status: 'no_expected', message: 'No se proporcionó payroll esperado' };
  }
  const diff = calculatedGross - expectedGross;
  const diffPct = (Math.abs(diff) / expectedGross) * 100;
  let status = 'ok';
  let message = `Diferencia: ${money(diff)} (${diffPct.toFixed(2)}%)`;
  if (diffPct > 1) {
    status = 'warning';
    message = `⚠️ Diferencia ${diffPct.toFixed(2)}% > 1%. Revisar bloques pendientes o diferidos.`;
  }
  return { diff, diffPct, status, message };
}

/**
 * MAIN: Run the full Payano Payroll Engine
 * @param {Array} rows - the CSV rows
 * @param {Object} colMap - column mapping
 * @param {Date} rangeStart - period start
 * @param {Date} rangeEnd - period end
 * @param {number} expectedGross - expected payroll total (optional)
 */
function runPayanoPayrollEngine(rows, colMap, rangeStart, rangeEnd, expectedGross) {
  // Step 1: Group using DUAL REVENUE MODEL
  //   - Block ID starts with "B-" -> BLOCK -> MAX
  //   - Otherwise -> LOAD -> SUM (grouped by Trip ID)
  const grouped = payanoGroupItems(rows, colMap);
  // Step 2: Classify
  const classified = payanoClassifyBlocks(grouped.groups, rangeStart, rangeEnd, colMap);
  // Step 2.5: Capture multi-driver warnings
  const multiDriverWarnings = grouped.multiDriverWarnings || [];
  // Step 3: Build trips
  let trips = payanoBuildTrips(classified, colMap);
  // Step 3b: Add ORPHAN trips from Amazon invoice that are NOT in CSV
  // (e.g. SPOT/Load Board trips that the user didn't include in their CSV)
  const amazonData = (typeof APP !== 'undefined' && APP.amazonInvoiceData) || null;
  const orphanResult = payanoAddOrphanInvoiceTrips(trips, amazonData, colMap);
  trips = orphanResult.trips;
  // Step 3c: Extract EXPENSES (tolls, credits, adjustments) — SEPARATE from Gross Revenue
  const expenses = payanoExtractExpenses(amazonData, orphanResult.tripIdLookup || {}, orphanResult.routeDriverLookup || {}, orphanResult.contractIdLookup || {});
  // Step 3d: Track tolls as pending (until company is identified or paid)
  trackPendingTolls(expenses);
  // Step 5: Calculate
  const { byDriver, byCompany } = payanoCalculatePayroll(trips);
  // Step 6: Reconcile
  const totalGross = trips.reduce((s, t) => s + t.pay, 0);
  const recon = payanoReconcile(totalGross, expectedGross);

  return {
    totalGroups: grouped.groups.length,
    totalBlocks: grouped.groups.length,  // backward compat alias
    totalBlockGroups: grouped.stats.totalBlockGroups,
    totalLoadGroups: grouped.stats.totalLoadGroups,
    ungroupedRows: grouped.ungroupedRows,
    ungroupedCount: grouped.ungroupedRows.length,
    multiDriverWarnings,
    inPeriod: classified.inPeriod.length,
    lastDayExcluded: classified.lastDayExcluded.length,
    deferred: classified.deferred.length,
    cancelled: classified.cancelled.length,
    beforeRange: classified.beforeRange.length,
    afterRange: classified.afterRange.length,
    trips,
    expenses,  // NEW: separated from Gross
    byDriver,
    byCompany,
    totalGross,
    expectedGross: expectedGross || 0,
    reconciliation: recon,
    classified, // raw classifications for UI
  };
}

/**
 * Get the list of pending blocks to be saved (last day + deferred)
 * These accumulate to next payroll
 */
function getPayanoPendingBlocks(classified) {
  return [
    ...classified.lastDayExcluded.map(b => ({ ...b, pendingReason: 'last_day' })),
    ...classified.deferred.map(b => ({ ...b, pendingReason: 'deferred' })),
  ];
}

 *   - paymentRate: number (% for percentage, $ for others)
 *   - defaultTractor: assigned tractor
 *   - status: Active / Inactive
 *   - balance: { advances: [], penalties: [], extras: [] }
 */
function getOwnerDrivers() {

  } catch (e) {}
  return [];

/**
 * Compute owner-driver payroll from trips assigned to this driver.
 * Uses the driver's payment type:
 *   - percentage: driver gets X% of trip pay
 *   - per_mile: driver gets $X per mile
 *   - fixed_per_block: driver gets $X per block (regardless of miles/pay)
 *   - fixed_per_load: driver gets $X per trip/load (no block)
 */
function computeOwnerDriverPay(driver, trips) {
  let gross = 0;
  let units = 0;
  trips.forEach(t => {
    if (driver.paymentType === 'percentage') {
      gross += (t.pay || 0) * (driver.paymentRate / 100);
    } else if (driver.paymentType === 'per_mile') {
      const miles = (t.miles || 0) * (driver.paymentRate || 0);
      gross += miles;
      units += (t.miles || 0);
    } else if (driver.paymentType === 'fixed_per_block') {
      if (t.type === 'BLOCK' || t.blockId) {
        gross += (driver.paymentRate || 0);
        units++;
      }
    } else if (driver.paymentType === 'fixed_per_load') {
      if (t.type === 'LOAD' || (!t.type && t.tripId)) {
        gross += (driver.paymentRate || 0);
        units++;
      }
    } else {
      // Default: percentage at 100%
      gross += (t.pay || 0);
    }
  });
  return { gross, units };
}

/**
 * Apply deductions/extras to a driver's gross pay:
 *   - advances: cash advance given before (subtracted)
 *   - penalties: penalty deduction (subtracted)
 *   - extras: extra payments (food, bonus) (added)
 */
function applyDriverAdjustments(driver, gross) {
  const balance = driver.balance || { advances: [], penalties: [], extras: [] };
  let net = gross;
  let advanceTotal = 0;
  let penaltyTotal = 0;
  let extrasTotal = 0;
  (balance.advances || []).forEach(a => { advanceTotal += (a.amount || 0); });
  (balance.penalties || []).forEach(p => { penaltyTotal += (p.amount || 0); });
  (balance.extras || []).forEach(e => { extrasTotal += (e.amount || 0); });
  net = gross - advanceTotal - penaltyTotal + extrasTotal;
  return {
    gross,
    advanceTotal,
    penaltyTotal,
    extrasTotal,
    net,
  };
}

function updatePaymentRateLabel() {
  const type = document.getElementById('odPaymentType').value;
  const label = document.getElementById('odPaymentRateLabel');
  if (type === 'percentage') label.textContent = 'Porcentaje (%)';
  else if (type === 'per_mile') label.textContent = 'Tarifa por Milla ($)';
  else label.textContent = 'Tarifa Fija ($)';
}

function saveOwnerDriverForm(driverId) {
  const name = document.getElementById('odName').value.trim();
  if (!name) return toast('Nombre requerido', 'error');
  const drivers = getOwnerDrivers();
  const driver = {
    id: driverId || ('od_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8)),
    name,
    licenseNumber: document.getElementById('odLicense').value.trim(),
    phone: document.getElementById('odPhone').value.trim(),
    email: document.getElementById('odEmail').value.trim(),
    defaultTractor: document.getElementById('odTractor').value.trim(),
    paymentType: document.getElementById('odPaymentType').value,
    paymentRate: Number(document.getElementById('odPaymentRate').value) || 0,
    status: 'Active',
    balance: drivers.find(d => d.id === driverId)?.balance || { advances: [], penalties: [], extras: [] },
    createdAt: drivers.find(d => d.id === driverId)?.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  const idx = drivers.findIndex(d => d.id === driverId);
  if (idx >= 0) drivers[idx] = driver;
  else drivers.push(driver);
  saveOwnerDrivers(drivers);
  closeModal();
  toast('✅ Chofer guardado', 'success');
  navigate('payroll');
}

function addOwnerDriverBalance(driverId, type) {
  const drivers = getOwnerDrivers();
  const driver = drivers.find(d => d.id === driverId);
  if (!driver) return;
  if (!driver.balance) driver.balance = { advances: [], penalties: [], extras: [] };
  const amountInput = document.getElementById('od' + (type === 'advances' ? 'Advance' : type === 'penalties' ? 'Penalty' : 'Extra') + 'Amount');
  const notesInput = document.getElementById('od' + (type === 'advances' ? 'Advance' : type === 'penalties' ? 'Penalty' : 'Extra') + 'Notes');
  const amount = Number(amountInput.value);
  if (!amount || amount <= 0) return toast('Monto requerido', 'error');
  driver.balance[type].push({ amount, notes: notesInput.value.trim(), date: new Date().toISOString().slice(0, 10) });
  saveOwnerDrivers(drivers);
  closeModal();
  openOwnerDriverModal(driverId);
}

function removeOwnerDriverBalance(driverId, type, idx) {
  const drivers = getOwnerDrivers();
  const driver = drivers.find(d => d.id === driverId);
  if (!driver || !driver.balance || !driver.balance[type]) return;
  driver.balance[type].splice(idx, 1);
  saveOwnerDrivers(drivers);
  closeModal();
  openOwnerDriverModal(driverId);
}

function deleteOwnerDriver(driverId) {
  if (!confirm('¿Eliminar este chofer?')) return;
  const drivers = getOwnerDrivers().filter(d => d.id !== driverId);
  saveOwnerDrivers(drivers);
  toast(t('drv.deleted') + ' 🗑️', 'success');
  navigate('payroll');
}

      } else if (driver.paymentType === 'per_mile') {

function showDriverInvoicePickerModal(driverId) {
  const driver = getOwnerDrivers().find(d => d.id === driverId);
  if (!driver) return toast(t('errors.driver_not_found'), 'error');

  const options = APP.invoices.map(inv => {
    const trips = (inv.trips || []).filter(t => t.driver === driver.name);
    const pay = computeOwnerDriverPay(driver, trips);
    const adj = applyDriverAdjustments(driver, pay.gross);
    return { inv, count: trips.length, total: adj.net };
  }).filter(o => o.count > 0);

  if (options.length === 0) {
    return toast(`No hay viajes de ${driver.name} en ninguna factura`, 'warning');
  }

  showModal(`

            <th style="text-align: right; padding: 8px;">Trips</th>
            <th style="text-align: right; padding: 8px;">Neto</th>
            <th style="text-align: center; padding: 8px;">Estado</th>
            <th style="text-align: center; padding: 8px;">Acción</th>
          </tr>

          ${options.map(o => `
            <tr style="border-bottom: 1px solid var(--border);">
              <td style="padding: 8px;"><b>${escapeHtml(o.inv.label)}</b></td>
              <td style="padding: 8px; font-size: 11px;">${fmtDate(o.inv.rangeStart)} → ${fmtDate(o.inv.rangeEnd)}</td>

/* ========================================================================
 * MI COMPAÑÍA — Sección dedicada para PAYANO EXPRESS LLC
 * Muestra solo los datos de TU empresa, separada del cálculo global.
 * Incluye:
 *   - Stats de tu empresa (no entra en totales globales)
 *   - Tus choferes con sus pagos (Mis Choferes)
 *   - Facturas de tu empresa

// Returns the owner's own company (PAYANO EXPRESS LLC)
function getMyCompany() {
  // Look for company with flag isOwner or matching PAYANO EXPRESS name
  let comp = APP.companies.find(c => c.isOwner);
  if (comp) return comp;
  comp = APP.companies.find(c => /payano express/i.test(c.name));
  return comp || null;
}

function renderMyCompanyView() {
  const myComp = getMyCompany();
  if (!myComp) {
    return `
      <div class="view-header">
        <div>
          <div class="view-title" data-i18n="nav.my_company">🏠 Mi Compañía</div>
          <div class="view-subtitle">Sección dedicada para tu empresa (no entra en totales globales)</div>
        </div>
      </div>
      <div class="card" style="background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border-left: 4px solid var(--warning);">
        <h3 style="color: var(--warning);">⚠️ No se encontró tu empresa</h3>
        <p style="color: var(--text-light); font-size: 13px; margin: 12px 0;">
          No se encontró una empresa marcada como "Mi Compañía" o con nombre "PAYANO EXPRESS LLC".
          <br><br>
          <b>Para configurar:</b>
        </p>
        <ol style="font-size: 13px; line-height: 1.6; padding-left: 24px;">
          <li>Ve a <b>🏢 Empresas</b></li>
          <li>Edita la empresa <b>PAYANO EXPRESS LLC</b></li>
          <li>Marca la casilla <b>★ Mi Compañía (no cobra 10%)</b></li>
        </ol>
        <button class="btn btn-primary" style="margin-top: 16px;" onclick="navigate('companies')">🏢 Ir a Empresas</button>
      </div>
    `;
  }
  
  // Calculate stats for my company (independent of global totals)
  const allInvoices = APP.invoices || [];
  const myInvoices = allInvoices.filter(inv => {
    return (inv.trips || []).some(t => {
      if (findCompanyByTractor(t.tractor)?.id === myComp.id) return true;
      if (t.driver) {
        const reg = findDriverByName(t.driver);
        if (reg && reg.companyId === myComp.id) return true;
      }
      return false;
    });
  });
  
  const myTrips = [];
  myInvoices.forEach(inv => {
    (inv.trips || []).forEach(t => {
      let matches = false;
      if (findCompanyByTractor(t.tractor)?.id === myComp.id) matches = true;
      else if (t.driver) {
        const reg = findDriverByName(t.driver);
        if (reg && reg.companyId === myComp.id) matches = true;
      }
      if (matches) myTrips.push({ ...t, invoiceId: inv.id, invoiceLabel: inv.label, rangeStart: inv.rangeStart, rangeEnd: inv.rangeEnd });
    });
  });
  
  // For PAYANO EXPRESS: NO commission is taken
  const myTotalGross = myTrips.reduce((s, t) => s + (t.pay || 0), 0);
  const myTotalMiles = myTrips.reduce((s, t) => s + (t.miles || 0), 0);
  // Commission is 0% for owner's company
  const myCommission = 0;
  const myNet = myTotalGross; // 100% goes to my company
  
  // My drivers (owner drivers)
  const myDrivers = (APP.drivers || []).filter(d => d.companyId === myComp.id);
  const myDriverPayments = myDrivers.map(d => {
    const driverTrips = myTrips.filter(t => t.driver && normalizeStr(t.driver) === normalizeStr(d.name));
    // Use new per-driver pay structure system
    const structure = getDriverPayStructure(d.id);
    const calc = calcDriverPayByStructure(d, driverTrips, structure);
    return {
      ...d,
      gross: calc.gross,
      miles: calc.miles,
      blocks: calc.blocks,
      loads: calc.loads,
      structureType: structure.type,
      pct: structure.pct,
      perMile: structure.perMile,
      fixedPerBlock: structure.fixedPerBlock,
      fixedPerLoad: structure.fixedPerLoad,
      totalBonuses: calc.totalBonuses,
      totalDeductions: calc.totalDeductions,
      driverPay: calc.net, // includes bonuses - deductions
      net: calc.gross - calc.net, // what owner keeps after paying driver
    };
  });
  
  const myTotalDriverPay = myDriverPayments.reduce((s, d) => s + d.driverPay, 0);
  const myNetAfterDrivers = myNet - myTotalDriverPay;
  
  return `
    <div class="view-header">

      </p>

        <div style="font-size: 28px; font-weight: 700; color: var(--blue);">${myTrips.length}</div>

const DRIVER_PAY_STRUCTURES = {
  percentage: { label: 'Porcentaje del Gross', icon: '💯' },
  per_mile: { label: 'Por Milla', icon: '📏' },
  fixed_per_block: { label: 'Fijo por Bloque', icon: '📦' },
  fixed_per_load: { label: 'Fijo por Viaje (Load)', icon: '🚛' },
  hybrid: { label: 'Híbrido (% + fijo)', icon: '🔀' },
};

// Per-driver pay structure (in localStorage, keyed by driverId)
function getDriverPayStructure(driverId) {
  if (!APP.driverPayStructures) APP.driverPayStructures = {};
  return APP.driverPayStructures[driverId] || { 
    type: 'percentage', 
    pct: 85, 
    perMile: 0.55, 
    fixedPerBlock: 0, 
    fixedPerLoad: 0,
    bonuses: [], // {label, amount}
    deductions: [], // {label, amount}
  };
}

function saveDriverPayStructure(driverId, structure) {
  if (!APP.driverPayStructures) APP.driverPayStructures = {};
  APP.driverPayStructures[driverId] = structure;
  localStorage.setItem('relaypay_driver_pay_structures', JSON.stringify(APP.driverPayStructures));
}

// Calculate driver pay based on structure
function calcDriverPayByStructure(driver, trips, structure) {
  const gross = trips.reduce((s, t) => s + (t.pay || 0), 0);
  const miles = trips.reduce((s, t) => s + (t.miles || 0), 0);
  const blocks = new Set(trips.map(t => t.primaryKey || t.blockId || t.tripId)).size;
  const loads = trips.length;
  
  let base = 0;
  if (structure.type === 'percentage') {
    base = gross * ((structure.pct || 85) / 100);
  } else if (structure.type === 'per_mile') {
    base = miles * (structure.perMile || 0.55);
  } else if (structure.type === 'fixed_per_block') {
    base = blocks * (structure.fixedPerBlock || 0);
  } else if (structure.type === 'fixed_per_load') {
    base = loads * (structure.fixedPerLoad || 0);
  } else if (structure.type === 'hybrid') {
    const pctPart = gross * ((structure.pct || 0) / 100);
    const fixedPart = (structure.fixedPerBlock || 0) * blocks;
    base = pctPart + fixedPart;
  }
  
  const totalBonuses = (structure.bonuses || []).reduce((s, b) => s + (Number(b.amount) || 0), 0);
  const totalDeductions = (structure.deductions || []).reduce((s, d) => s + (Number(d.amount) || 0), 0);
  
  return {
    gross, miles, blocks, loads, base,
    bonuses: structure.bonuses || [],
    deductions: structure.deductions || [],
    totalBonuses, totalDeductions,
    net: base + totalBonuses - totalDeductions,
  };
}
