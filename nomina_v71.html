function addPayItem(driverId, type) {
  const structure = getDriverPayStructure(driverId);
  if (type === 'bonus') {
    structure.bonuses = structure.bonuses || [];
    structure.bonuses.push({ label: '', amount: 0 });
  } else {
    structure.deductions = structure.deductions || [];
    structure.deductions.push({ label: '', amount: 0 });
  }
  saveDriverPayStructure(driverId, structure);
  openDriverPayStructureModal(driverId);
}

function removePayItem(driverId, type, idx) {
  const structure = getDriverPayStructure(driverId);
  if (type === 'bonus') structure.bonuses.splice(idx, 1);
  else structure.deductions.splice(idx, 1);
  saveDriverPayStructure(driverId, structure);
  openDriverPayStructureModal(driverId);
}

function saveDriverPayStructureFromModal(driverId) {
  const structure = getDriverPayStructure(driverId);
  // Read selected radio
  const selectedRadio = document.querySelector('input[name="payType"]:checked');
  if (selectedRadio) structure.type = selectedRadio.value;
  
  // Read all numeric fields
  const pct = document.getElementById('payPct');
  if (pct) structure.pct = Number(pct.value) || 85;
  const perMile = document.getElementById('payPerMile');
  if (perMile) structure.perMile = Number(perMile.value) || 0.55;
  const fixedBlock = document.getElementById('payFixedBlock');
  if (fixedBlock) structure.fixedPerBlock = Number(fixedBlock.value) || 0;
  const fixedLoad = document.getElementById('payFixedLoad');
  if (fixedLoad) structure.fixedPerLoad = Number(fixedLoad.value) || 0;
  
  // Read bonuses
  const bonusLabels = document.querySelectorAll('.bonus-label');
  const bonusAmounts = document.querySelectorAll('.bonus-amount');
  structure.bonuses = [];
  bonusLabels.forEach((labelEl, i) => {
    structure.bonuses.push({
      label: labelEl.value,
      amount: Number(bonusAmounts[i]?.value) || 0,
    });
  });
  
  // Read deductions
  const deductLabels = document.querySelectorAll('.deduct-label');
  const deductAmounts = document.querySelectorAll('.deduct-amount');
  structure.deductions = [];
  deductLabels.forEach((labelEl, i) => {
    structure.deductions.push({
      label: labelEl.value,
      amount: Number(deductAmounts[i]?.value) || 0,
    });
  });
  
  saveDriverPayStructure(driverId, structure);
  closeModal();
  toast('✅ Estructura de pago guardada', 'success');
  refreshCurrentView();
}

// Generate invoice for a single driver
function downloadDriverInvoice(driverId, invoiceId) {
  const driver = APP.drivers.find(d => d.id === driverId);
  if (!driver) return toast(t('errors.driver_not_found'), 'error');
  
  const myComp = getMyCompany();
  if (!myComp) return toast('No se encontró tu empresa', 'error');
  
  // If multiple invoices, let user pick which week's invoice to use
  if (!invoiceId && APP.invoices.length > 1) {
    const invoiceOptions = APP.invoices.map(inv => 
      `<option value="${inv.id}">${escapeHtml(inv.label)} (${fmtDate(inv.rangeStart)} → ${fmtDate(inv.rangeEnd)})</option>`
    ).join('');
    showModal(`
      <h2>📅 Selecciona la semana</h2>
      <p style="color: var(--text-light); font-size: 13px;">El comprobante se genera con los viajes de ESA semana únicamente. Si cambiaste la estructura de pago, usa la factura más reciente.</p>
      <div class="form-group">
        <label>Semana de pago</label>
        <select id="driverInvoiceWeek">${invoiceOptions}</select>
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;">
        <button class="btn" onclick="closeModal()"><span data-i18n="common.cancel">Cancelar</span></button>
        <button class="btn btn-primary" onclick="downloadDriverInvoice('${driverId}', document.getElementById('driverInvoiceWeek').value)">Generar</button>
      </div>
    `, 'small');
    return;
  }
  
  const inv = APP.invoices.find(i => i.id === invoiceId) || APP.invoices[APP.invoices.length - 1];
  if (!inv) return toast('No hay facturas guardadas', 'error');
  
  const driverTrips = (inv.trips || []).filter(t => {
    if (t.driver && normalizeStr(t.driver) === normalizeStr(driver.name)) return true;
    return false;
  }).map(t => ({ ...t, invoiceLabel: inv.label, rangeStart: inv.rangeStart, rangeEnd: inv.rangeEnd }));
  
  if (driverTrips.length === 0) return toast(`Este chofer no tiene viajes en ${inv.label}`, 'warning');
  
  // Use the CURRENT pay structure (so if user changed it, the new structure is applied)
  const structure = getDriverPayStructure(driverId);
  generateDriverInvoicePDF(driver, driverTrips, inv, myComp, structure);
}

async function generateDriverInvoicePDF(driver, trips, inv, comp, structureOverride) {
  if (typeof window.jspdf === 'undefined') {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  if (typeof window.jspdf === 'undefined') return toast('No se pudo cargar PDF', 'error');
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 40;
  let y = 50;
  
  // Header
  doc.setFillColor(0, 30, 60);
  doc.rect(0, 0, pageWidth, 90, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('COMPROBANTE DE PAGO', margin, 45);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text(`Chofer: ${driver.name}`, margin, 65);
  doc.setFontSize(9);
  doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`, margin, 80);
  
  // Company info
  y = 120;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('De:', margin, y);
  doc.setFontSize(12);
  doc.text(comp.name, margin, y + 15);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  let infoY = y + 32;
  if (comp.mcNumber) { doc.text(`MC: ${comp.mcNumber}`, margin, infoY); infoY += 12; }
  if (comp.contactPhone) { doc.text(`Tel: ${comp.contactPhone}`, margin, infoY); infoY += 12; }
  
  // Period
  infoY += 8;
  doc.setFont('helvetica', 'bold');
  doc.text('Periodo:', margin, infoY);
  doc.setFont('helvetica', 'normal');
  doc.text(`${fmtDate(inv.rangeStart)} - ${fmtDate(inv.rangeEnd)}`, margin + 60, infoY);
  
// Calculate payment based on structure
  const structure = structureOverride || getDriverPayStructure(driver.id);
  const calc = calcDriverPayByStructure(driver, trips, structure);
  const structureLabel = DRIVER_PAY_STRUCTURES[structure.type]?.label || structure.type;
  
// Calculate per-block "what the driver earns" based on structure
  function driverEarnForTrip(t) {
    if (structure.type === 'percentage') {
      return (t.pay || 0) * ((structure.pct || 85) / 100);
    } else if (structure.type === 'per_mile') {
      return (t.miles || 0) * (structure.perMile || 0.55);
    } else if (structure.type === 'fixed_per_block') {
      return structure.fixedPerBlock || 0;
    } else if (structure.type === 'fixed_per_load') {
      return structure.fixedPerLoad || 0;
    } else if (structure.type === 'hybrid') {
      const pctPart = (t.pay || 0) * ((structure.pct || 0) / 100);
      return pctPart + (structure.fixedPerBlock || 0);
    }
    return 0;
  }
  
  // Table of trips - 5 columns: Block ID, Tractor, Fecha, Millas, Pago Chofer
  y = infoY + 30;
  doc.setFillColor(0, 30, 60);
  doc.rect(margin, y, pageWidth - 2 * margin, 18, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text('Block ID', margin + 4, y + 12);
  doc.text('Tractor', margin + 110, y + 12);
  doc.text('Fecha', margin + 195, y + 12);
  doc.text('Millas', margin + 285, y + 12);
  doc.text('Pago Chofer', margin + 380, y + 12);
  y += 18;
  
  doc.setTextColor(0, 0, 0);
  doc.setFont('helvetica', 'normal');
  let totalDriverEarn = 0;
  trips.forEach((t, i) => {
    if (y > 720) { doc.addPage(); y = 50; }
    if (i % 2 === 0) {
      doc.setFillColor(248, 250, 252);
      doc.rect(margin, y, pageWidth - 2 * margin, 16, 'F');
    }
    const earn = driverEarnForTrip(t);
    totalDriverEarn += earn;
    doc.setFontSize(9);
    doc.text(String(t.primaryKey || t.blockId || t.tripId || '-').slice(0, 20), margin + 4, y + 11);
    doc.text(String(t.tractor || '-').slice(0, 12), margin + 110, y + 11);
    doc.text(t.date ? fmtDate(t.date) : '-', margin + 195, y + 11);
    doc.text(t.miles ? t.miles.toFixed(1) : '0.0', margin + 285, y + 11);
    doc.setTextColor(220, 38, 38);
    doc.setFont('helvetica', 'bold');
    doc.text('$' + earn.toFixed(2), margin + 380, y + 11);
    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'normal');
    y += 16;
  });
  
  // Summary box - ONLY shows driver's pay, no Amazon gross
  y += 14;
  doc.setFillColor(0, 30, 60);
  const totalHeight = 90 + (calc.bonuses.length * 14) + (calc.deductions.length * 14);
  doc.rect(margin, y, pageWidth - 2 * margin, totalHeight, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('TU PAGO', margin + 10, y + 18);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text(`Bloques trabajados: ${calc.blocks}`, margin + 10, y + 35);
  doc.text(`Millas recorridas: ${calc.miles.toFixed(1)}`, margin + 10, y + 48);
  
  let ry = y + 65;
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(254, 165, 30);
  doc.text(`Pago por bloques (${structureLabel}):`, margin + 10, ry);
  doc.text(`$${totalDriverEarn.toFixed(2)}`, pageWidth - margin - 100, ry);
  ry += 14;
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'normal');
  
  if (calc.bonuses.length > 0) {
    doc.setTextColor(134, 239, 172);
    doc.text(`BONOS:`, margin + 10, ry);
    doc.setTextColor(255, 255, 255);
    ry += 12;
    calc.bonuses.forEach(b => {
      doc.setFontSize(8);
      doc.text(`  + ${b.label || 'Bono'}:`, margin + 20, ry);
      doc.text(`+$${(b.amount || 0).toFixed(2)}`, pageWidth - margin - 100, ry);
      ry += 12;
    });
    doc.setFontSize(9);
  }
  
  if (calc.deductions.length > 0) {
    doc.setTextColor(252, 165, 165);
    doc.text(`DEDUCCIONES:`, margin + 10, ry);
    doc.setTextColor(255, 255, 255);
    ry += 12;
    calc.deductions.forEach(d => {
      doc.setFontSize(8);
      doc.text(`  - ${d.label || 'Deduccion'}:`, margin + 20, ry);
      doc.text(`-$${(d.amount || 0).toFixed(2)}`, pageWidth - margin - 100, ry);
      ry += 12;
    });
    doc.setFontSize(9);
  }
  
  doc.setDrawColor(255, 255, 255);
  doc.line(margin + 10, ry - 2, pageWidth - margin - 10, ry - 2);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(254, 165, 30);
  doc.text('TOTAL A PAGAR:', margin + 10, ry + 12);
  doc.text(`$${calc.net.toFixed(2)}`, pageWidth - margin - 100, ry + 12);
  
  y += totalHeight + 20;
  
  // Signature line
  doc.setTextColor(0, 0, 0);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  if (y > 700) { doc.addPage(); y = 50; }
  doc.text('Firma del chofer: ___________________________', margin, y);
  doc.text('Fecha: ______________', pageWidth - margin - 150, y);
  
  doc.save(`Comprobante_${driver.name.replace(/[^a-z0-9]/gi, '_')}_${fmtDateInput(new Date())}.pdf`);
  toast(`✅ Comprobante de pago generado para ${driver.name}`, 'success');
}


/* ========================================================================
 * PENDIENTES — Blocks NOT in current invoice, tracked for next-week reconciliation
 * Alerts: PAGADO (block found in later invoice) or DISPUTA (still missing)
 * ======================================================================== */

function renderPendientesView() {
  // Ensure pendingBlocks exists
  if (!APP.pendingBlocks) APP.pendingBlocks = [];

  // Group pending blocks by status
  const stillPending = [];
  const paidNow = []; // Recently paid (from the last reconciliation run)
  const disputed = []; // Older than 2 weeks with no payment

  const TWO_WEEKS_MS = 14 * 24 * 60 * 60 * 1000;
  const now = Date.now();

  (APP.pendingBlocks || []).forEach(pb => {
    const ageMs = now - new Date(pb.addedAt || pb.updatedAt || now).getTime();
    if (pb.paidAt) {
      paidNow.push({ ...pb, status: 'PAGADO' });
    } else if (ageMs > TWO_WEEKS_MS) {
      disputed.push({ ...pb, status: 'DISPUTA', ageDays: Math.floor(ageMs / (24 * 60 * 60 * 1000)) });
    } else {
      stillPending.push({ ...pb, status: 'PENDIENTE' });
    }
  });

  // Look up extra info from invoices
  const allInvoices = APP.invoices || [];
  const blockInInvoice = (blockId) => allInvoices.some(inv => (inv.trips || []).some(t => t.blockId === blockId));

  return `
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <div>
          <h2 style="color: var(--navy); margin: 0;" data-i18n="pend.title">⏳ Bloques Pendientes de Pago</h2>
          <p style="color: var(--text-light); font-size: 13px; margin: 4px 0 0;" data-i18n="pend.desc">
            Blocks que no aparecieron en la factura de Amazon esta semana. Se marcan como PENDIENTES,
            se verifica en la siguiente semana si fueron PAGADOS, o se alertan como DISPUTA si pasan 14+ días sin pago.
          </p>
        </div>
        <div>
          <button class="btn btn-secondary" onclick="manualAddPending()" data-i18n="pend.add_block">+ Marcar Bloque Pendiente</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px;">
        <div style="background: linear-gradient(135deg, #fef3c7, #fde68a); padding: 16px; border-radius: 8px; border-left: 4px solid var(--warning);">
          <div style="font-size: 11px; color: var(--text-light); text-transform: uppercase;" data-i18n="status.pending">⏳ Pendientes</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--warning);">${stillPending.length}</div>
          <div style="font-size: 11px; color: var(--text-light);" data-i18n="pend.waiting_payment">Esperando pago</div>
        </div>
        <div style="background: linear-gradient(135deg, #d1fae5, #a7f3d0); padding: 16px; border-radius: 8px; border-left: 4px solid var(--success);">
          <div style="font-size: 11px; color: var(--text-light); text-transform: uppercase;" data-i18n="status.paid">✅ Pagados</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--success);">${paidNow.length}</div>
          <div style="font-size: 11px; color: var(--text-light);" data-i18n="pend.liquidated_later">Liquidados después</div>
        </div>
        <div style="background: linear-gradient(135deg, #fee2e2, #fecaca); padding: 16px; border-radius: 8px; border-left: 4px solid var(--danger);">
          <div style="font-size: 11px; color: var(--text-light); text-transform: uppercase;">⚠️ Disputa</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--danger);">${disputed.length}</div>
          <div style="font-size: 11px; color: var(--text-light);">14+ días sin pago</div>
        </div>
      </div>

      ${disputed.length > 0 ? `
        <div class="alert alert-danger" style="background: #fee2e2; border-left: 4px solid var(--danger); padding: 12px; margin-bottom: 12px; border-radius: 4px;">
          <b>⚠️ ${disputed.length} bloques en DISPUTA</b> — llevan más de 14 días sin aparecer en factura de Amazon.
          Considera abrirlos como disputa formal con Amazon Relay.
        </div>
      ` : ''}

      ${paidNow.length > 0 ? `
        <div class="alert alert-success" style="background: #d1fae5; border-left: 4px solid var(--success); padding: 12px; margin-bottom: 12px; border-radius: 4px;">
          <b>✅ ${paidNow.length} bloques PAGADOS</b> desde la última revisión.
        </div>
      ` : ''}

      ${(stillPending.length + paidNow.length + disputed.length) === 0 ? `
        <div style="text-align: center; padding: 32px; color: var(--text-light);">
          <p style="font-size: 14px;">📭 No hay bloques pendientes de pago.</p>
          <p style="font-size: 12px;">Los bloques aparecerán aquí cuando proceses una factura de Amazon y no aparezcan en el invoice.</p>
        </div>
      ` : `
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: var(--bg);">
              <th style="text-align: left; padding: 8px;">Estado</th>
              <th style="text-align: left; padding: 8px;">Block ID</th>
              <th style="text-align: left; padding: 8px;">Driver</th>
              <th style="text-align: left; padding: 8px;">Tractor</th>
              <th style="text-align: right; padding: 8px;">Estimado</th>
              <th style="text-align: left; padding: 8px;">Agregado</th>
              <th style="text-align: left; padding: 8px;">Notas</th>
              <th style="text-align: center; padding: 8px;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${[...disputed, ...stillPending, ...paidNow].map(pb => {
              const statusBadge = {
                'PAGADO': '<span style="background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">✅ PAGADO</span>',
                'PENDIENTE': '<span style="background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">⏳ PENDIENTE</span>',
                'DISPUTA': '<span style="background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;">⚠️ DISPUTA ' + pb.ageDays + 'd</span>',
              }[pb.status];
              return `
                <tr style="border-bottom: 1px solid var(--border); ${pb.status === 'DISPUTA' ? 'background: #fef2f2;' : (pb.status === 'PAGADO' ? 'background: #f0fdf4;' : '')}">
                  <td style="padding: 8px;">${statusBadge}</td>
                  <td style="padding: 8px; font-family: monospace; font-size: 11px;">${escapeHtml(pb.blockId)}</td>
                  <td style="padding: 8px;">${escapeHtml(pb.driver || '—')}</td>
                  <td style="padding: 8px; font-family: monospace;">${escapeHtml(pb.tractor || '—')}</td>
                  <td style="padding: 8px; text-align: right;">${pb.estimatedPay ? money(pb.estimatedPay) : '—'}</td>
                  <td style="padding: 8px; font-size: 11px;">${pb.addedAt ? new Date(pb.addedAt).toLocaleDateString('es-MX') : '—'}</td>
                  <td style="padding: 8px; font-size: 11px;">${escapeHtml(pb.notes || '')}</td>
                  <td style="padding: 8px; text-align: center;">
                    ${pb.status !== 'PAGADO' ? `<button class="btn btn-sm btn-success" onclick="markPendingPaid('${pb.blockId}')">✓ Pagado</button>` : ''}
                    ${pb.status === 'PAGADO' ? `<button class="btn btn-sm btn-secondary" onclick="unmarkPendingPaid('${pb.blockId}')">↩ Reabrir</button>` : ''}
                    <button class="btn btn-sm btn-danger" onclick="deletePending('${pb.blockId}')">🗑️</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
}

function manualAddPending() {
  showModal(`
    <h2>+ Marcar Bloque Pendiente</h2>
    <p style="color: var(--text-light); font-size: 13px;">Marca un bloque manualmente como pendiente de pago. Útil si lo viste en una factura anterior y no aparece en la actual.</p>
    <div class="form-row">
      <div class="form-group">
        <label>Block ID *</label>
        <input type="text" id="pbBlockId" placeholder="Ej: B-XYZ12345">
      </div>
      <div class="form-group">
        <label>Driver</label>
        <input type="text" id="pbDriver" placeholder="Nombre del chofer">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tractor</label>
        <input type="text" id="pbTractor" placeholder="Placa">
      </div>
      <div class="form-group">
        <label>Estimado ($)</label>
        <input type="number" id="pbEstPay" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="pbNotes" rows="2" placeholder="Notas adicionales..."></textarea>
    </div>
    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;">
      <button class="btn" onclick="closeModal()"><span data-i18n="common.cancel">Cancelar</span></button>
      <button class="btn btn-primary" onclick="confirmAddPending()">+ Agregar</button>
    </div>
  `, 'medium');
}

function confirmAddPending() {
  const blockId = document.getElementById('pbBlockId').value.trim();
  if (!blockId) return toast('Block ID requerido', 'error');
  if (!APP.pendingBlocks) APP.pendingBlocks = [];
  if (APP.pendingBlocks.find(pb => pb.blockId === blockId)) {
    return toast('Este bloque ya está en pendientes', 'warning');
  }
  APP.pendingBlocks.push({
    blockId,
    driver: document.getElementById('pbDriver').value.trim(),
    tractor: document.getElementById('pbTractor').value.trim(),
    estimatedPay: Number(document.getElementById('pbEstPay').value) || 0,
    notes: document.getElementById('pbNotes').value.trim(),
    addedAt: new Date().toISOString(),
  });
  savePendingBlocks();
  closeModal();
  toast('✅ Bloque agregado', 'success');
  navigate('pendientes');
}

function markPendingPaid(blockId) {
  const pb = (APP.pendingBlocks || []).find(p => p.blockId === blockId);
  if (!pb) return;
  pb.paidAt = new Date().toISOString();
  pb.paidFrom = pb.paidFrom || 'manual';
  savePendingBlocks();
  toast('✅ Marcado como pagado', 'success');
  navigate('pendientes');
}

function unmarkPendingPaid(blockId) {
  const pb = (APP.pendingBlocks || []).find(p => p.blockId === blockId);
  if (!pb) return;
  delete pb.paidAt;
  savePendingBlocks();
  toast('↩ Reabierto como pendiente', 'success');
  navigate('pendientes');
}

function deletePending(blockId) {
  if (!confirm('¿Eliminar este pendiente?')) return;
  if (!APP.pendingBlocks) return;
  APP.pendingBlocks = APP.pendingBlocks.filter(p => p.blockId !== blockId);
  savePendingBlocks();
  toast('🗑️ Eliminado', 'success');
  navigate('pendientes');
}

/* ========================================================================
 * GLOBAL SEARCH ENGINE — searches across all data in the system
 * ======================================================================== */

function renderSearchView() {
  return `
    <div class="card">
      <div style="margin-bottom: 16px;">
        <h2 style="color: var(--navy); margin: 0;" data-i18n="search.title">🔍 Buscador Global</h2>
        <p style="color: var(--text-light); font-size: 13px; margin: 4px 0 12px;" data-i18n="search.desc">
          Busca por <b>nombre de chofer</b>, <b>placa de camión</b>, <b>Block ID</b>, <b>Trip ID</b>, <b>Load ID</b>, <b>Contract ID</b>, o <b>número de invoice</b>.
        </p>
        <input type="text" id="globalSearchInput" data-i18n-placeholder="search.input_placeholder" placeholder="Escribe para buscar..." autofocus
          oninput="runGlobalSearch(this.value)"
          style="width: 100%; padding: 12px; font-size: 16px; border: 2px solid var(--border); border-radius: 8px;">
      </div>
      <div id="globalSearchResults"></div>
    </div>
  `;
}

function runGlobalSearch(query) {
  query = (query || '').trim();
  const resultsDiv = document.getElementById('globalSearchResults');
  if (!query) {
    resultsDiv.innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 24px;">Empieza a escribir para buscar...</p>';
    return;
  }
  const q = query.toLowerCase();
  const results = { drivers: [], tractors: [], blocks: [], trips: [], contracts: [], invoices: [], expenses: [] };

  // Search drivers (both APP.drivers and owner drivers)
  (APP.drivers || []).forEach(d => {
    if (d.name.toLowerCase().includes(q)) {
      results.drivers.push({ ...d, source: 'company' });
    }
  });
  getOwnerDrivers().forEach(d => {
    if (d.name.toLowerCase().includes(q)) {
      results.drivers.push({ ...d, source: 'owner' });
    }
  });

  // Search tractors
  (APP.companies || []).forEach(c => {
    (c.tractors || []).forEach(t => {
      if (t.toLowerCase().includes(q)) {
        results.tractors.push({ tractor: t, company: c.name });
      }
    });
  });

  // Search invoices (and their trips)
  (APP.invoices || []).forEach(inv => {
    if (inv.label?.toLowerCase().includes(q) || inv.invoiceNumber?.toLowerCase().includes(q)) {
      results.invoices.push(inv);
    }
    (inv.trips || []).forEach(t => {
      if (t.blockId && t.blockId.toLowerCase().includes(q)) {
        // Compute block status: paid (in this invoice) or pending (not yet paid)
        const inPending = (APP.pendingBlocks || []).some(pb => pb.blockId === t.blockId && !pb.paidAt);
        results.blocks.push({ ...t, invoice: inv.label, invoiceNumber: inv.invoiceNumber, status: inPending ? '⏳ PENDIENTE (de otra semana)' : '✅ PAGADO', invoiceId: inv.id });
      }
      if (t.tripId && t.tripId.toLowerCase().includes(q)) {
        results.trips.push({ ...t, invoice: inv.label, invoiceNumber: inv.invoiceNumber, status: '✅ PAGADO', invoiceId: inv.id });
      }
      if (t.loadId && t.loadId.toLowerCase().includes(q)) {
        results.trips.push({ ...t, invoice: inv.label, invoiceNumber: inv.invoiceNumber, status: '✅ PAGADO', invoiceId: inv.id });
      }
      if (t.contractId && t.contractId.toLowerCase().includes(q)) {
        results.contracts.push({ ...t, invoice: inv.label, invoiceNumber: inv.invoiceNumber, invoiceId: inv.id });
      }
    });
  });

  // Search expenses (Toll Recoveries, etc.)
  const preview = APP.currentInvoicePreview;
  if (preview && preview.payanoResult && preview.payanoResult.expenses) {
    preview.payanoResult.expenses.forEach(e => {
      if (e.driver?.toLowerCase().includes(q) || e.tripId?.toLowerCase().includes(q) || e.blockId?.toLowerCase().includes(q) || e.loadId?.toLowerCase().includes(q) || e.invoiceNumber?.toLowerCase().includes(q)) {
        results.expenses.push(e);
      }
    });
  }

  // Build HTML
  let html = '';

  // DRIVERS
  if (results.drivers.length > 0) {
    html += `<div style="margin-top: 16px;"><h3 style="color: var(--navy);">👤 Choferes (${results.drivers.length})</h3>`;
    results.drivers.forEach(d => {
      const company = (APP.companies || []).find(c => c.id === d.companyId);
      html += `<div style="background: var(--bg); padding: 12px; margin: 6px 0; border-radius: 6px; border-left: 3px solid var(--blue);">
        <b>${escapeHtml(d.name)}</b> ${d.source === 'owner' ? '<span style="background: var(--orange); color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px;">MI EMPLEADO</span>' : '<span style="background: var(--blue); color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px;">EMPRESA</span>'}

/* ========================================================================
 * TOLLS VIEW — Dedicated management of "Adjustments - Trailer Toll Recovery"
 * Searches across ALL invoices (current + past) and ALL trip data
 * to identify which company/trip the toll belongs to.
 * Allows manual assignment when automatic identification fails.
 * ======================================================================== */

// Build a comprehensive toll catalog across all invoices
function buildTollCatalog() {
  const catalog = [];
  const seen = new Set();
  
  // Load persistent manual assignments
  if (!APP.tollAssignments) APP.tollAssignments = JSON.parse(localStorage.getItem('relaypay_toll_assignments') || '{}');
  
  // 1) Get tolls from current preview (if any)
  const preview = APP.currentInvoicePreview;
  if (preview && preview.payanoResult && preview.payanoResult.expenses) {
    preview.payanoResult.expenses.forEach((e, idx) => {
      if (e.category === 'Toll Deduction') {
        const key = `${e.invoiceNumber || 'X'}-${e.tripId || e.blockId || e.loadId || 'X'}`;
        if (!seen.has(key)) {
          seen.add(key);
          // Apply persistent assignment if no override
          if (!e._assignedCompanyId && APP.tollAssignments[key]) {
            e._assignedCompanyId = APP.tollAssignments[key];
          }
          catalog.push({ ...e, _source: 'preview', _idx: idx });
        }
      }
    });
  }
  
  // 2) Get tolls from saved invoices
  (APP.invoices || []).forEach(inv => {
    (inv.tolls || []).forEach((e, idx) => {
      const key = `${inv.invoiceNumber || 'X'}-${e.tripId || e.blockId || e.loadId || 'X'}`;
      if (!seen.has(key)) {
        seen.add(key);
        // Apply persistent assignment if no override
        if (!e._assignedCompanyId && APP.tollAssignments[key]) {
          e._assignedCompanyId = APP.tollAssignments[key];
        }
        catalog.push({ ...e, _source: 'invoice', _invoiceId: inv.id, _invoiceLabel: inv.label, _idx: idx });
      }
    });
  });
  
  return catalog;
}

// Try to identify which company a toll belongs to by searching ALL data
function identifyTollOwner(toll) {
  // Build tripId lookup from ALL data sources
  const tripIdLookup = {};
  const routeDriverLookup = {};
  const contractIdLookup = {};
  
  // 1) From current pendingFiles (CSV being processed)
  (APP.pendingFiles || []).forEach(f => {
    const colMap = f.colMap || {};
    (f.rows || []).forEach(r => {
      const tripId = String(r['Trip ID'] || r[colMap.colTrip] || '').trim();
      const blockId = String(r['Block ID'] || r[colMap.colBlock] || '').trim();
      const loadId = String(r['Load ID'] || '').trim();
      const contractId = String(r['Contract ID'] || '').trim();
      const driver = String(r['Driver Name'] || r[colMap.colDriver] || '').trim();
      const tractor = String(r['Tractor Vehicle ID'] || r[colMap.colTractor] || '').trim();
      const route = String(r['Facility Sequence'] || r['Domicile/Route'] || r['Route'] || '').trim();
      if (tripId && driver) tripIdLookup[tripId] = { driver, tractor };
      if (loadId && driver) tripIdLookup[loadId] = { driver, tractor };
      if (blockId && driver) tripIdLookup[blockId] = { driver, tractor };
      if (contractId && driver) contractIdLookup[contractId] = { driver, tractor };
      if (route && driver) routeDriverLookup[route] = { driver, tractor };
    });
  });
  
  // 2) From all saved invoices — look at trip/block/load data
  (APP.invoices || []).forEach(inv => {
    (inv.trips || []).forEach(t => {
      if (t.primaryKey && t.driver) tripIdLookup[t.primaryKey] = { driver: t.driver, tractor: t.tractor };
      if (t.contractId && t.driver) contractIdLookup[t.contractId] = { driver: t.driver, tractor: t.tractor };
    });
  });
  
  // Now try to match the toll
  const tripId = toll.tripId || toll.loadId || toll.blockId;
  const route = toll.route || '';
  const contractId = toll.contractId || '';
  
  // Try tripId exact
  let match = tripIdLookup[tripId];
  
  // Try stripping T-/B- prefix
  if (!match && tripId) {
    const stripped = String(tripId).replace(/^[TB]-/, '');
    match = tripIdLookup[stripped] || tripIdLookup['T-' + stripped] || tripIdLookup['B-' + stripped];
  }
  
  // Try contractId
  if (!match && contractId) match = contractIdLookup[contractId];
  
  // Try route
  if (!match && route) match = routeDriverLookup[route];
  
  return match; // { driver, tractor } or null
}

  const unassigned = totalTolls - autoMatched;
  
  // Group by status
  const matched = [];

  catalog.forEach((toll, idx) => {
    let companyId = toll._assignedCompanyId;

// Quick assign from dropdown
function quickAssignToll(globalIdx, companyId) {
  if (!companyId) return;
  const catalog = buildTollCatalog();
  const toll = catalog[globalIdx];
  if (!toll) return toast('Toll no encontrado', 'error');
  
  // Set _assignedCompanyId on the right object
  if (toll._source === 'preview' && APP.currentInvoicePreview) {
    const expense = APP.currentInvoicePreview.payanoResult.expenses[toll._idx];
    if (expense) expense._assignedCompanyId = companyId;
  } else if (toll._source === 'invoice') {
    const inv = APP.invoices.find(i => i.id === toll._invoiceId);
    if (inv && inv.tolls && inv.tolls[toll._idx]) {
      inv.tolls[toll._idx]._assignedCompanyId = companyId;
      saveInvoices();
    }
  }
  
  // Also save to a global toll assignments map for persistence
  if (!APP.tollAssignments) APP.tollAssignments = {};
  const key = `${toll.invoiceNumber || 'X'}-${toll.tripId || toll.blockId || toll.loadId || 'X'}`;
  APP.tollAssignments[key] = companyId;
  localStorage.setItem('relaypay_toll_assignments', JSON.stringify(APP.tollAssignments));
  
  toast('✅ Toll asignado. Se aplicará a la factura final como deducción.', 'success');
  refreshCurrentView();
}

// Assign a pending (historical) toll to a company
function assignPendingToll(tollKey, companyId) {
  if (!companyId) return;
  if (!APP.pendingTolls) APP.pendingTolls = [];
  const idx = APP.pendingTolls.findIndex(p => p.id === tollKey);
  if (idx < 0) return toast('Toll no encontrado', 'error');
  
  // Save manual assignment so it applies to future loads
  if (!APP.tollAssignments) APP.tollAssignments = {};
  APP.tollAssignments[tollKey] = companyId;
  localStorage.setItem('relaypay_toll_assignments', JSON.stringify(APP.tollAssignments));
  
  // Remove from pending
  APP.pendingTolls.splice(idx, 1);
  localStorage.setItem('relaypay_pending_tolls', JSON.stringify(APP.pendingTolls));
  
  const comp = APP.companies.find(c => c.id === companyId);
  toast(`✅ Toll asignado a ${comp ? comp.name : 'empresa'} y guardado como deducción permanente.`, 'success');
  refreshCurrentView();
}


/* ========================================================================
 * COMPANY DEDUCTIONS — Track and apply deductions to company amount-to-collect.
 *
 * Categories:
 *   - Fuel (Combustible)
 *   - Tolls (Peajes)
 *   - Insurance (Seguros)
 *   - Cash Advance (Avance de Efectivo)
 *
 * RULES (per user spec):
 *   - All deductions are subtracted from the company's AMOUNT TO COLLECT.
 *   - They NEVER come out of the total (which would affect the user's commission).
 *   - Each deduction references the trip/block where it was incurred.
 * ======================================================================== */

const DEDUCTION_CATEGORIES = [
  { key: 'fuel', label: 'Combustible', icon: '⛽', color: 'var(--orange)' },
  { key: 'tolls', label: 'Peajes', icon: '🛣️', color: 'var(--warning)' },
  { key: 'insurance', label: 'Seguros', icon: '🛡️', color: 'var(--purple)' },
  { key: 'cash_advance', label: 'Avance de Efectivo', icon: '💵', color: 'var(--danger)' },
  { key: 'other', label: 'Otro', icon: '📌', color: 'var(--text-light)' },
];

function getCompanyDeductions() {
  try {
    const stored = localStorage.getItem('relaypay_company_deductions');
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return [];
}

function saveCompanyDeductions(list) {
  localStorage.setItem('relaypay_company_deductions', JSON.stringify(list));
}

/**
 * Apply deductions + toll deductions to a company's amount-to-collect.
 *
 * companyGross = sum of trip pays for trips in this company
 * commission = companyGross * commissionPct
 * netToCompany = companyGross - commission
 *
 * tollDeductions: from payanoResult.expenses (Toll Deduction category, mapped to this company)
 * manualDeductions: from localStorage (fuel, insurance, cash advance, etc.)
 *
 * finalAmountToCollect = netToCompany - tollDeductions - manualDeductions
 *
 * IMPORTANT: Deductions never affect the user's commission. Commission is computed
 * BEFORE deductions. Only the net-to-company is reduced.
 */
function computeCompanyNetToCollect(companyId, companyGross, commissionPct, invoiceId) {
  const commission = companyGross * (commissionPct / 100);
  const netToCompany = companyGross - commission;

  // Sum toll deductions for this company in this invoice
  const preview = APP.currentInvoicePreview;
  let tollDeductions = 0;
  if (preview && preview.payanoResult && preview.payanoResult.expenses) {
    tollDeductions = preview.payanoResult.expenses
      .filter(e => e.category === 'Toll Deduction')
      .filter(e => e._assignedCompanyId === companyId)
      .reduce((s, e) => s + Math.abs(e.amount || 0), 0);
  }

  // Manual deductions from localStorage for this company+invoice
  const manualDeductions = getCompanyDeductions()
    .filter(d => d.companyId === companyId && d.invoiceId === invoiceId)
    .reduce((s, d) => s + (d.amount || 0), 0);

  const totalDeductions = tollDeductions + manualDeductions;
  const finalNet = netToCompany - totalDeductions;

  return {
    gross: companyGross,
    commission,
    commissionPct,
    netToCompany,
    tollDeductions,
    manualDeductions,
    totalDeductions,
    finalNet,
  };
}

/**
 * Render deductions summary for a company (in invoice preview)
 */
function renderCompanyDeductionsSummary(companyId, companyGross, commissionPct, invoiceId) {
  const result = computeCompanyNetToCollect(companyId, companyGross, commissionPct, invoiceId);

  if (result.totalDeductions === 0) return '';

  const items = [];
  if (result.tollDeductions > 0) {
    items.push(`<div class="line"><span>🛣️ Toll Deductions (Amazon):</span><b>−${money(result.tollDeductions)}</b></div>`);
  }
  if (result.manualDeductions > 0) {
    // List manual deductions
    const manualList = getCompanyDeductions()
      .filter(d => d.companyId === companyId && d.invoiceId === invoiceId);
    manualList.forEach(d => {
      const cat = DEDUCTION_CATEGORIES.find(c => c.key === d.category) || DEDUCTION_CATEGORIES[4];
      items.push(`<div class="line"><span>${cat.icon} ${escapeHtml(d.label || cat.label)}:</span><b>−${money(d.amount)}</b>${d.tripId || d.blockId ? ` <small style="color: var(--text-light);">(${escapeHtml(d.tripId || d.blockId)})</small>` : ''}</div>`);
    });
  }

  return `
    <details style="margin-top: 8px; padding: 8px; background: var(--bg); border-radius: 4px;">
      <summary style="cursor: pointer; font-size: 12px; color: var(--danger); font-weight: 600;">
        ⚠️ ${items.length} deducción(es): −${money(result.totalDeductions)}
      </summary>
      <div style="margin-top: 8px; font-size: 12px;">
        ${items.join('')}
      </div>
    </details>
  `;
}

function confirmAddDeduction(companyId, invoiceId) {
  const amount = Number(document.getElementById('dedAmount').value);

  const deductions = getCompanyDeductions();
  deductions.push({
    id: 'ded_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    companyId,
    invoiceId,
    category: document.getElementById('dedCategory').value,
    amount,
    tripId: (document.getElementById('dedRef').value || '').startsWith('T-') ? document.getElementById('dedRef').value : '',

      'tol.catalog': 'Full Tolls Catalog',
      'pay.subtitle_active': 'Current week payment calculation',
    }
  };
  
  // Auto-detect browser language on first visit
  function detectInitialLanguage() {
    const saved = localStorage.getItem('relaypay_language');
    if (saved) return saved;
    const browserLang = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
    if (browserLang.startsWith('en')) return 'en';
    if (browserLang.startsWith('es')) return 'es';
    return 'es'; // Default to Spanish (user's preference)
  }
  let currentLang = detectInitialLanguage();
  localStorage.setItem('relaypay_language', currentLang);
  
  function t(key) {
    return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
  }
  
  function setLanguage(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem('relaypay_language', lang);
    document.documentElement.lang = lang;
    applyTranslations();
  }
  
  function getLanguage() {
    return currentLang;
  }
  
  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.placeholder = t(key);
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
      const key = el.getAttribute('data-i18n-title');
      el.title = t(key);
    });
  }
  
  // Expose globally
  window.I18N = I18N;
  window.t = t;
  window.setLanguage = setLanguage;
  window.getLanguage = getLanguage;
  window.applyTranslations = applyTranslations;
  window.i18n = I18N;
  
  // Apply on load
  document.documentElement.lang = currentLang;
  
  // Wait for DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyTranslations);
  } else {
    setTimeout(applyTranslations, 100);
  }
  
  // ALSO re-apply after ANY DOM change (but throttle to prevent loops)
  let isApplying = false;
  const observer = new MutationObserver(() => {
    if (isApplying) return;
    isApplying = true;
    setTimeout(() => {
      applyTranslations();
      isApplying = false;
    }, 100);
  });
  observer.observe(document.body, { childList: true, subtree: true });
  
  // changeLanguage function (called from buttons)
  window.changeLanguage = function(lang) {
    setLanguage(lang);
    // Show toast
    if (typeof toast === 'function') {
      toast(t(lang === 'es' ? 'toast.lang_changed_es' : 'toast.lang_changed_en'), 'success');
    }
    // Re-render current view
    if (typeof refreshCurrentView === 'function') {
      refreshCurrentView();
    } else if (typeof navigate === 'function' && typeof APP !== 'undefined' && APP.currentView) {
      navigate(APP.currentView);
    } else {
      setTimeout(() => location.reload(), 500);
    }
  };
  
  console.log('✅ i18n system loaded - language:', currentLang);
})();
</script>
