/**
 * Render Deductions by Company — shows what each company owes after toll deductions + manual deductions
 * CRITICAL: Deductions are deducted from the company's amount-to-collect, NOT from the user's commission.
 */
function renderDeductionsByCompanyReport(p) {
  if (!p || !p.payanoResult) return '';
  const expenses = p.payanoResult.expenses || [];
  const tollExpenses = expenses.filter(e => e.category === 'Toll Deduction');
  if (tollExpenses.length === 0 && (typeof getCompanyDeductions === 'function' ? getCompanyDeductions() : []).length === 0) return '';

  // Group tolls by company
  const tollsByCompany = {};
  tollExpenses.forEach(e => {
    let companyId = e._assignedCompanyId;
    if (!companyId && e.driver) {
      const reg = findDriverByName(e.driver);
      if (reg) companyId = reg.companyId;
    }
    if (!companyId && e.tractor) {
      const tc = findCompanyByTractor(e.tractor);
      if (tc) companyId = tc.id;
    }
    if (!companyId) return; // Skip unassigned for now
    if (!tollsByCompany[companyId]) tollsByCompany[companyId] = { count: 0, total: 0, items: [] };
    tollsByCompany[companyId].count++;
    tollsByCompany[companyId].total += Math.abs(e.amount);
    tollsByCompany[companyId].items.push(e);
  });

  // Group manual deductions by company
  const manualByCompany = {};
  (typeof getCompanyDeductions === 'function' ? getCompanyDeductions() : []).forEach(d => {
    if (d.invoiceId !== p._invoiceId || !d.invoiceId) {
      // Show all manual deductions if no specific invoice
      if (!manualByCompany[d.companyId]) manualByCompany[d.companyId] = { count: 0, total: 0, items: [] };
      manualByCompany[d.companyId].count++;
      manualByCompany[d.companyId].total += (d.amount || 0);
      manualByCompany[d.companyId].items.push(d);
    }
  });

  // Merge all companies
  const companyIds = new Set([...Object.keys(tollsByCompany), ...Object.keys(manualByCompany)]);

  // Compute gross/net per company
  const byCompanyGross = {};
  (p.inRange || []).forEach(t => {
    let comp = findCompanyByTractor(t.tractor);
    if (!comp && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg && reg.companyId) comp = APP.companies.find(c => c.id === reg.companyId);
    }
    if (!comp) return;
    const companyId = comp.id;
    if (!byCompanyGross[companyId]) byCompanyGross[companyId] = { name: comp.name, gross: 0, commission: 0, commissionPct: comp.commissionPct || p.commissionPct };
    byCompanyGross[companyId].gross += (t.pay || 0);
    byCompanyGross[companyId].commission = byCompanyGross[companyId].gross * (byCompanyGross[companyId].commissionPct / 100);
  });

  return `
    <div class="card" style="margin-top: 24px; border-left: 4px solid var(--danger);">
      <h3 style="color: var(--danger); margin-bottom: 4px;">💸 Débitos y Deducciones por Empresa</h3>
      <p style="color: var(--text-light); font-size: 12px; margin-bottom: 16px;">
        Los débitos (Toll Recovery y otras deducciones) se <b>restan del monto a cobrar</b> de cada empresa.
        <b>Tu comisión NUNCA se ve afectada</b> — siempre cobras sobre el Gross.
      </p>
      ${companyIds.size === 0 ? '<p style="color: var(--text-light); text-align: center;">No hay deducciones para mostrar.</p>' : `
        <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
          <thead>
            <tr style="background: var(--bg);">
              <th style="text-align: left; padding: 8px;">Empresa</th>
              <th style="text-align: right; padding: 8px;">Gross</th>
              <th style="text-align: right; padding: 8px;">Tu Comisión</th>
              <th style="text-align: right; padding: 8px;">Neto a Cobrar (antes)</th>
              <th style="text-align: right; padding: 8px;">− Toll Recovery</th>
              <th style="text-align: right; padding: 8px;">− Otras Deducciones</th>
              <th style="text-align: right; padding: 8px;">💰 FINAL A PAGAR</th>
            </tr>
          </thead>
          <tbody>
            ${Array.from(companyIds).map(cid => {
              const grossInfo = byCompanyGross[cid] || { name: '?', gross: 0, commission: 0, commissionPct: p.commissionPct };
              const tolls = tollsByCompany[cid] || { count: 0, total: 0, items: [] };
              const manual = manualByCompany[cid] || { count: 0, total: 0, items: [] };
              const netBeforeDeductions = grossInfo.gross - grossInfo.commission;
              const finalAmount = netBeforeDeductions - tolls.total - manual.total;
              return `
                <tr style="border-bottom: 1px solid var(--border);">
                  <td style="padding: 8px;"><b>${escapeHtml(grossInfo.name)}</b><br><small style="color: var(--text-light);">${grossInfo.commissionPct}% comisión</small></td>
                  <td style="padding: 8px; text-align: right;">${money(grossInfo.gross)}</td>
                  <td style="padding: 8px; text-align: right; color: var(--success); font-weight: 600;">${money(grossInfo.commission)}</td>
                  <td style="padding: 8px; text-align: right;">${money(netBeforeDeductions)}</td>
                  <td style="padding: 8px; text-align: right; color: var(--danger);">${tolls.count > 0 ? '−' + money(tolls.total) + ` <small>(${tolls.count})</small>` : '—'}</td>
                  <td style="padding: 8px; text-align: right; color: var(--danger);">${manual.count > 0 ? '−' + money(manual.total) + ` <small>(${manual.count})</small>` : '—'}</td>
                  <td style="padding: 8px; text-align: right; font-weight: 700; color: ${finalAmount >= 0 ? 'var(--navy)' : 'var(--danger)'};">${money(finalAmount)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
          <tfoot>
            <tr style="background: var(--bg); font-weight: 700;">
              <td style="padding: 8px;">TOTAL COMISIONES</td>
              <td style="padding: 8px; text-align: right;">${money(Array.from(companyIds).reduce((s, cid) => s + (byCompanyGross[cid]?.gross || 0), 0))}</td>
              <td style="padding: 8px; text-align: right; color: var(--success);">${money(Array.from(companyIds).reduce((s, cid) => s + (byCompanyGross[cid]?.commission || 0), 0))}</td>
              <td style="padding: 8px; text-align: right;">${money(Array.from(companyIds).reduce((s, cid) => {
                const g = byCompanyGross[cid] || { gross: 0, commission: 0 };
                return s + (g.gross - g.commission);
              }, 0))}</td>
              <td style="padding: 8px; text-align: right; color: var(--danger);">−${money(Array.from(companyIds).reduce((s, cid) => s + (tollsByCompany[cid]?.total || 0), 0))}</td>
              <td style="padding: 8px; text-align: right; color: var(--danger);">−${money(Array.from(companyIds).reduce((s, cid) => s + (manualByCompany[cid]?.total || 0), 0))}</td>
              <td style="padding: 8px; text-align: right; color: var(--navy);">${money(Array.from(companyIds).reduce((s, cid) => {
                const g = byCompanyGross[cid] || { gross: 0, commission: 0 };
                const tolls = tollsByCompany[cid]?.total || 0;
                const manual = manualByCompany[cid]?.total || 0;
                return s + (g.gross - g.commission - tolls - manual);
              }, 0))}</td>
            </tr>
          </tfoot>
        </table>
        <p style="margin-top: 12px; font-size: 11px; color: var(--text-light); text-align: center;">
          <b>Tu comisión</b> se calcula sobre el Gross y <b>NUNCA</b> se ve afectada por las deducciones.
        </p>
      `}
    </div>
  `;
}

function renderReports() {
  // Filters
  const fDateFrom = document.getElementById('repDateFrom')?.value || '';
  const fDateTo = document.getElementById('repDateTo')?.value || '';
  const fCompany = document.getElementById('repCompany')?.value || '';
  const fDriver = document.getElementById('repDriver')?.value || '';
  const fTractor = document.getElementById('repTractor')?.value || '';
  const fTab = APP._reportTab || 'company';

  let trips = [];
  APP.invoices.forEach(inv => {
    (inv.trips || []).forEach(t => {
      trips.push({ ...t, invoiceId: inv.id, invoiceLabel: inv.label, rangeStart: inv.rangeStart, rangeEnd: inv.rangeEnd, commissionPct: inv.commissionPct });
    });
  });
  // Apply filters
  if (fDateFrom) trips = trips.filter(t => t.date && new Date(t.date) >= new Date(fDateFrom));
  if (fDateTo) trips = trips.filter(t => t.date && new Date(t.date) <= new Date(fDateTo + 'T23:59:59'));
  if (fCompany) {
    trips = trips.filter(t => {
      const c = findCompanyByTractor(t.tractor);
      return c && c.id === fCompany;
    });
  }
  if (fDriver) trips = trips.filter(t => t.driver === fDriver);
  if (fTractor) trips = trips.filter(t => t.tractor === fTractor);

  const totalGross = trips.reduce((s, t) => s + t.pay, 0);
  const totalComm = trips.reduce((s, t) => s + t.pay * (t.commissionPct || 10) / 100, 0);
  const totalToComp = totalGross - totalComm;

  return `
    <div class="view-header">
      <div>
        <h1 class="view-title" data-i18n="nav.reports">📈 Reportes</h1>
        <p class="view-subtitle" data-i18n="rep.subtitle">Análisis de payroll, por empresa, chofer, ruta y viaje</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="exportReportExcel()">📊 <span data-i18n="rep.export_excel">Exportar a Excel</span></button>
      </div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="rep.filters">🔍 Filtros</div>
      <div class="form-row-3">
        <div class="form-group">
          <label data-i18n="rep.date_from">📅 Desde</label>
          <input type="date" id="repDateFrom" value="${fDateFrom}" onchange="refreshCurrentView()">
        </div>
        <div class="form-group">
          <label data-i18n="rep.date_to">📅 Hasta</label>
          <input type="date" id="repDateTo" value="${fDateTo}" onchange="refreshCurrentView()">
        </div>
        <div class="form-group">
          <label data-i18n="rep.company">🏢 Empresa</label>
          <select id="repCompany" onchange="refreshCurrentView()">
            <option value="" data-i18n="common.all">Todas</option>
            ${APP.companies.map(c => `<option value="${c.id}" ${fCompany === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label data-i18n="rep.driver">👤 Chofer</label>
          <select id="repDriver" onchange="refreshCurrentView()">
            <option value="" data-i18n="common.all">Todos</option>
            ${[...new Set(trips.map(t => t.driver).filter(Boolean))].sort().map(d => `<option value="${escapeHtml(d)}" ${fDriver === d ? 'selected' : ''}>${escapeHtml(d)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="rep.tractor">🚛 Tractor</label>
          <select id="repTractor" onchange="refreshCurrentView()">
            <option value="" data-i18n="common.all">Todos</option>
            ${[...new Set(trips.map(t => t.tractor).filter(Boolean))].sort().map(t => `<option value="${escapeHtml(t)}" ${fTractor === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="display: flex; align-items: flex-end;">
          <button class="btn btn-secondary" onclick="clearReportFilters()" data-i18n="rep.clear_filters">🗑️ Limpiar Filtros</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="label" data-i18n="pay.trips">🚛 Viajes</div><div class="value">${trips.length}</div></div>
      <div class="stat-card"><div class="label" data-i18n="rep.total_gross">💰 Total Bruto</div><div class="value">${moneyShort(totalGross)}</div></div>
      <div class="stat-card gold"><div class="label" data-i18n="pay.my_commission">⭐ Mi Comisión</div><div class="value money-mine">${moneyShort(totalComm)}</div></div>
      <div class="stat-card green"><div class="label" data-i18n="rep.to_collect">💼 A Cobrar</div><div class="value money-positive">${moneyShort(totalToComp)}</div></div>
    </div>

    <div class="tabs">
      <div class="tab ${fTab === 'company' ? 'active' : ''}" onclick="setReportTab('company')" data-i18n="rep.tab_company">🏢 Por Empresa</div>
      <div class="tab ${fTab === 'driver' ? 'active' : ''}" onclick="setReportTab('driver')" data-i18n="rep.tab_driver">👤 Por Chofer</div>
      <div class="tab ${fTab === 'route' ? 'active' : ''}" onclick="setReportTab('route')" data-i18n="rep.tab_route">📋 Por Ruta (Contract ID)</div>

function setReportTab(tab) { APP._reportTab = tab; navigate('reports'); }
function clearReportFilters() {
  ['repDateFrom', 'repDateTo', 'repCompany', 'repDriver', 'repTractor'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  refreshCurrentView();

function renderReportByCompany(trips) {
  const byComp = {};
  trips.forEach(t => {
    const c = findCompanyByTractor(t.tractor);
    const key = c ? c.id : '__none';
    if (!byComp[key]) byComp[key] = { company: c, trips: 0, total: 0, comm: 0, toComp: 0, drivers: new Set(), tractors: new Set() };
    byComp[key].trips++;
    byComp[key].total += t.pay;
    byComp[key].comm += t.pay * (t.commissionPct || 10) / 100;
    byComp[key].toComp += t.pay * (1 - (t.commissionPct || 10) / 100);
    if (t.driver) byComp[key].drivers.add(t.driver);
    if (t.tractor) byComp[key].tractors.add(t.tractor);
  });
  const rows = Object.values(byComp);
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="cmp.name">Empresa</th>
            <th class="text-right">Choferes</th>
            <th class="text-right">Tractores</th>
            <th class="text-right">Viajes</th>
            <th class="text-right">Total</th>
            <th class="text-right">A Cobrar</th>
            <th class="text-right" data-i18n="pay.my_commission">Mi Comisión</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><b>${r.company ? escapeHtml(r.company.name) : '<span class="badge badge-warning">⚠️ Sin empresa</span>'}</b></td>
              <td class="text-right">${r.drivers.size}</td>
              <td class="text-right">${r.tractors.size}</td>
              <td class="text-right">${r.trips}</td>
              <td class="text-right money">${money(r.total)}</td>
              <td class="text-right money money-positive">${money(r.toComp)}</td>
              <td class="text-right money money-mine">${money(r.comm)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// Export to Excel
async function exportReportExcel() {
  if (typeof XLSX === 'undefined') {
    return toast('Cargando librería de Excel... intenta de nuevo', 'warning');
  }
  const wb = XLSX.utils.book_new();

  // Sheet 1: By company
  const trips = [];
  APP.invoices.forEach(inv => (inv.trips || []).forEach(t => trips.push({ ...t, invoiceLabel: inv.label, commissionPct: inv.commissionPct })));
  const byComp = {};
  trips.forEach(t => {
    const c = findCompanyByTractor(t.tractor);
    const key = c ? c.name : '⚠️ Sin empresa';
    if (!byComp[key]) byComp[key] = { empresa: key, viajes: 0, total: 0, comision: 0, aCobrar: 0 };
    byComp[key].viajes++;
    byComp[key].total += t.pay;
    byComp[key].comision += t.pay * (t.commissionPct || 10) / 100;
    byComp[key].aCobrar += t.pay * (1 - (t.commissionPct || 10) / 100);
  });
  const ws1 = XLSX.utils.json_to_sheet(Object.values(byComp));
  XLSX.utils.book_append_sheet(wb, ws1, 'Por Empresa');

  // Sheet 2: All trips
  const tripRows = trips.map(t => ({
    Fecha: fmtDate(t.date),
    Chofer: t.driver,
    Tractor: t.tractor,
    ContractID: t.contractId,
    Estado: t.stage,
    Pago: t.pay,
    Comision: t.pay * (t.commissionPct || 10) / 100,
    ACobrar: t.pay * (1 - (t.commissionPct || 10) / 100),
    Factura: t.invoiceLabel,
  }));
  const ws2 = XLSX.utils.json_to_sheet(tripRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Todos los Viajes');

  // Sheet 3: Invoices summary
  const invRows = APP.invoices.map(inv => ({
    Factura: inv.label,
    Desde: fmtDate(inv.rangeStart),
    Hasta: fmtDate(inv.rangeEnd),
    Viajes: inv.totals?.tripCount || 0,
    Total: inv.totals?.totalGross || 0,
    Comision: inv.totals?.totalCommission || 0,
    ACobrar: inv.totals?.totalToCompanies || 0,
    Fecha: fmtDateTime(inv.createdAt),
  }));
  const ws3 = XLSX.utils.json_to_sheet(invRows);
  XLSX.utils.book_append_sheet(wb, ws3, 'Facturas');

  XLSX.writeFile(wb, `relaypay_reporte_${fmtDateInput(new Date())}.xlsx`);
  toast('📊 Excel exportado', 'success');
}

function changeLanguage(lang) {
  if (!window.i18n || !window.setLanguage) {
    toast('Sistema de traducciones cargando... intenta de nuevo en 2 segundos', 'warning');
    return;
  }
  // Set the language and save preference
  window.setLanguage(lang);
  localStorage.setItem('relaypay_language', lang);
  
  // Show confirmation
  toast(lang === 'es' ? '✅ Idioma cambiado a Español' : '✅ Language changed to English', 'success');
  
  // Apply translations to current page
  if (typeof window.applyTranslations === 'function') {
    window.applyTranslations();
  }
  
  // Re-render the current view to show translated buttons
  if (APP && APP.currentView) {
    if (typeof refreshCurrentView === 'function') {
      refreshCurrentView();
    } else if (typeof navigate === 'function') {
      navigate(APP.currentView);
    } else {
      // Fallback: simple reload
      setTimeout(() => location.reload(), 500);
    }
  }
}

function exportAllData() {
  const data = {
    version: '6.0',
    exportedAt: new Date().toISOString(),
    companies: APP.companies,
    drivers: APP.drivers,
    invoices: APP.invoices,
    settings: APP.settings,
  };

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `relaypay_backup_${fmtDateInput(new Date())}.json`;

}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) return toast('Archivo no válido', 'error');
      if (!confirm(`¿Importar este respaldo?\n\n${data.companies?.length || 0} empresas, ${data.drivers?.length || 0} choferes, ${data.invoices?.length || 0} facturas.\n\nSe REEMPLAZARÁN los datos actuales.`)) return;
      APP.companies = data.companies || [];
      APP.drivers = data.drivers || [];
      APP.invoices = data.invoices || [];
      APP.settings = data.settings || { commissionPct: 10 };
      saveData();
      toast('✅ Respaldo importado', 'success');
      navigate('dashboard');
    } catch (err) {
      console.error(err);
      toast('Error al leer el archivo: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function resetAllData() {
  if (!confirm('⚠️ ¿BORRAR TODOS LOS DATOS?\n\nEsta acción no se puede deshacer.\n\nRecomendamos hacer un respaldo primero.')) return;
  if (!confirm('Última confirmación: ¿Seguro?')) return;
  APP.companies = []; APP.drivers = []; APP.invoices = [];
  APP.settings = {
    commissionPct: 10,
    currency: 'USD',
    payanoDateColumn: 'stop1',
    payanoCutoffTime: '00:00',
    payanoLastDayToNextWeek: false,
    payanoIncludeZeroPay: false,
    payanoUseDominantDriver: false,
  };
  saveData();
  toast('Todos los datos eliminados', 'success');
  navigate('dashboard');
}

// ====================================================================
// FILE READING UTILITIES
// ====================================================================
async function readFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') return readCSV(file);
  if (ext === 'xlsx' || ext === 'xls') return readXLSX(file);
  throw new Error('Formato no soportado: ' + ext);
}

function readCSV(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return reject(new Error('CSV vacío'));
        const headers = parseCSVLine(lines[0]);
        const rows = lines.slice(1).map(line => {
          const values = parseCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => obj[h.trim()] = (values[i] || '').trim());
          return obj;
        });
        resolve({ columns: headers.map(h => h.trim()), rows });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Error al leer CSV'));
    reader.readAsText(file);
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === ',' && !inQuotes) {
      result.push(cur);
      cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

function readXLSX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        // Use first sheet
        const ws = wb.Sheets[wb.SheetNames[0]];
        const arr = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
        if (arr.length === 0) return reject(new Error('Hoja vacía'));
        const columns = Object.keys(arr[0]);
        resolve({ columns, rows: arr });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Error al leer Excel'));
    reader.readAsArrayBuffer(file);
  });
}

/**
 * Read an Amazon Relay invoice XLSX (Payment Summary + Payment Details structure).
 * Returns rows from "Payment Details" + a structured amazonPay object.
 *   amazonPay.trips[tripId] = { tour, loads, total }
 *   amazonPay.blocks[blockId] = { completed, loads, total }
 */
function readAmazonInvoiceXLSX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        // 1) Read Payment Summary for invoice total, invoice #, date
        let invoiceTotal = 0, invoiceNumber = '', invoiceDate = '', carrier = '', scac = '';
        const sumSheet = wb.SheetNames.find(n => /payment.*summary/i.test(n));
        if (sumSheet) {
          const wsSum = wb.Sheets[sumSheet];
          const range = XLSX.utils.decode_range(wsSum['!ref'] || 'A1:Z100');
          for (let R = 0; R <= Math.min(range.e.r, 30); R++) {
            for (let C = 0; C <= range.e.c; C++) {
              const cell = wsSum[XLSX.utils.encode_cell({ r: R, c: C })];
              if (cell && typeof cell.v === 'string') {
                const v = cell.v.toLowerCase();
                // Try multiple offsets for the value (C+1, C+2, C+3 — Amazon varies)
                const tryGet = (colOffset) => {
                  for (let off = 1; off <= 4; off++) {
                    const c = wsSum[XLSX.utils.encode_cell({ r: R, c: colOffset + (off - 1) })];
                    if (c && c.v != null && String(c.v).trim() !== '' && c !== cell) {
                      return c;
                    }
                  }
                  return null;
                };
                if (v.includes('invoice total') && invoiceTotal === 0) {
                  const tc = tryGet(C + 1);
                  if (tc) invoiceTotal = parseFloat(String(tc.v).replace(/[^\d.-]/g, '')) || 0;
                }
                if ((v.includes('invoice #') || v.includes('invoice number')) && !invoiceNumber) {
                  const nc = tryGet(C + 1);
                  if (nc) invoiceNumber = String(nc.v);
                }
                if (v.includes('invoice date') && !invoiceDate) {
                  const dc = tryGet(C + 1);
                  if (dc) invoiceDate = String(dc.v);
                }
                if (v.includes('carrier') && !carrier) {
                  const cc = tryGet(C + 1);
                  if (cc) carrier = String(cc.v);
                }
                if (v.includes('scac') && !scac) {
                  const sc = tryGet(C + 1);
                  if (sc) scac = String(sc.v);
                }
              }
            }
          }
        }
        // 1.5) Classify invoice type (Main/Adjustment/Dispute/Credit/Debit) by content
        // We do this AFTER reading Payment Details below, but flag here for use later
        const isDisputeWorkbook = wb.SheetNames.some(n => /dispute/i.test(n)) ||
                                  (carrier && /dispute/i.test(String(carrier)));
        // 2) Read Payment Details for actual revenue
        // Use raw: true to preserve signed numbers (raw: false can lose negatives on currency format)
        const detailsSheetName = wb.SheetNames.find(n => /payment.*detail/i.test(n)) || wb.SheetNames[1] || wb.SheetNames[0];
        const ws = wb.Sheets[detailsSheetName];
        const arr = XLSX.utils.sheet_to_json(ws, { defval: '', raw: true });
        if (arr.length === 0) return reject(new Error('Hoja Payment Details vacía'));
        const columns = Object.keys(arr[0]);
        const colBlock = columns.find(c => /block.*id|^block$/i.test(c));
        const colTrip = columns.find(c => /trip.*id|^trip$/i.test(c));
        const colLoad = columns.find(c => /load.*id|^load$/i.test(c));
        const colItem = columns.find(c => /item.*type|^item$/i.test(c));
        const colGross = columns.find(c => /gross.*pay|^gross$/i.test(c)) || columns[columns.length - 2];
        const colContract = columns.find(c => /contract.*id|^contract$/i.test(c));
        const colRoute = columns.find(c => /route/i.test(c));
        if (!colItem || !colGross) {
          return reject(new Error('No se detectaron columnas Item Type / Gross Pay'));
        }
        // 1.6) Classify invoice type based on content
        const allItems = arr.map(r => String(r[colItem] || '')).join(' ').toLowerCase();
        const hasAdjustments = /adjustment|toll.*recover|trailer.*toll/.test(allItems);
        const hasOnlyAdjustments = arr.every(r => /adjustment|recovery/i.test(String(r[colItem] || '')));
        const rowCount = arr.length;
        let invoiceType = 'Main Invoice';
        if (isDisputeWorkbook) {
          invoiceType = 'Dispute Invoice';
        } else if (Math.abs(invoiceTotal) < 500 && rowCount < 10) {
          invoiceType = invoiceTotal < 0 ? 'Credit Memo' : (rowCount === 1 && hasAdjustments ? 'Adjustment Invoice' : 'Debit Memo');
        } else if (hasOnlyAdjustments || (hasAdjustments && rowCount < 15)) {
          invoiceType = 'Adjustment Invoice';
        } else if (invoiceTotal < 0) {
          invoiceType = 'Credit Memo';
        } else if (rowCount < 10) {
          invoiceType = 'Debit Memo';
        }
        // 3) Build amazonPay structure with invoice# traceability
        const amazonPay = { trips: {}, blocks: {}, allLineItems: [] };
        let detailsTotal = 0;
        // Get the actual invoice total to filter phantom rows
        const phantomFilter = Math.abs(invoiceTotal) || Infinity;
        arr.forEach(row => {
          const block = String(row[colBlock] || '').trim();
          let trip = String(row[colTrip] || '').trim();
          // If no trip but Load ID exists, use Load ID as the trip key
          if (!trip && colLoad) {
            const loadId = String(row[colLoad] || '').trim();
            if (loadId) trip = loadId;
          }
          const item = String(row[colItem] || '').trim();
          const gross = parseFloat(String(row[colGross] || '0').replace(/[^\d.-]/g, '')) || 0;
          const contractId = colContract ? String(row[colContract] || '').trim() : '';
          const route = colRoute ? String(row[colRoute] || '').trim() : '';
          // Skip phantom footer rows where gross equals the full invoice total
          if (Math.abs(gross) >= Math.abs(phantomFilter) - 0.01 && Math.abs(phantomFilter) > 0 && !block && !trip) return;
          detailsTotal += gross;
          // Store every line item for traceability
          amazonPay.allLineItems.push({
            invoiceNumber, invoiceDate, carrier, scac,
            blockId: block, tripId: trip, item, gross, contractId,
          });
          if (block && /block.*completed/i.test(item)) {
            // Pure Block (no trip) — Block base pay
            if (!amazonPay.blocks[block]) amazonPay.blocks[block] = { completed: 0, loads: 0, total: 0, invoiceNumber, invoiceDate, invoiceType };
            amazonPay.blocks[block].completed += gross;
          } else if (block && trip) {
            // Leg under a block — only add to block, NOT to trip (avoid double counting)
            if (!amazonPay.blocks[block]) amazonPay.blocks[block] = { completed: 0, loads: 0, total: 0, invoiceNumber, invoiceDate, invoiceType };
            amazonPay.blocks[block].loads += gross;
          } else if (trip && /tour.*completed/i.test(item)) {
            // TOUR - COMPLETED (Load Board, no block) — base pay for the trip
            if (!amazonPay.trips[trip]) amazonPay.trips[trip] = { tripId: trip, tour: 0, loads: 0, total: 0, invoiceNumber, invoiceDate, contractId, route, itemType: item, invoiceType };
            amazonPay.trips[trip].tour += gross;
          } else if (trip) {
            // Leg of a Load Board trip (no block) — add to trip loads
            if (!amazonPay.trips[trip]) amazonPay.trips[trip] = { tripId: trip, tour: 0, loads: 0, total: 0, invoiceNumber, invoiceDate, contractId, route, itemType: item, invoiceType };
            amazonPay.trips[trip].loads += gross;
          }
        });
        Object.values(amazonPay.blocks).forEach(b => { b.total = b.completed + b.loads; });
        Object.values(amazonPay.trips).forEach(t => { t.total = t.tour + t.loads; });
        // 4) Read Carry-Over Details for context (contracts with remaining blocks)
        const carryOverContracts = [];
        const coSheet = wb.SheetNames.find(n => /carry.*over/i.test(n));
        if (coSheet) {
          const wsCO = wb.Sheets[coSheet];
          // Find header row (with "Contract ID" in it)
          const range = XLSX.utils.decode_range(wsCO['!ref'] || 'A1:Z100');
          let headerRow = -1, contractCol = -1, blocksToBePaidCol = -1, totalBlocksCol = -1, prevInvoicedCol = -1, weekCol = -1;
          for (let R = 0; R <= range.e.r; R++) {
            const row = [];
            for (let C = 0; C <= range.e.c; C++) {
              const c = wsCO[XLSX.utils.encode_cell({ r: R, c: C })];
              if (c && c.v) row.push({ v: String(c.v), c: C });
            }
            for (const cell of row) {
              if (/contract.*id/i.test(cell.v) && contractCol < 0) { contractCol = cell.c; headerRow = R; }
              if (/blocks.*to.*be.*paid/i.test(cell.v) && blocksToBePaidCol < 0) blocksToBePaidCol = cell.c;
              if (/total.*blocks/i.test(cell.v) && totalBlocksCol < 0) totalBlocksCol = cell.c;
              if (/previously.*invoiced/i.test(cell.v) && prevInvoicedCol < 0) prevInvoicedCol = cell.c;
              if (/calendar.*week/i.test(cell.v) && weekCol < 0) weekCol = cell.c;
            }
            if (headerRow >= 0) break;
          }
          // Read data rows
          if (contractCol >= 0) {
            for (let R = headerRow + 1; R <= range.e.r; R++) {
              const get = (col) => {
                if (col < 0) return '';
                const c = wsCO[XLSX.utils.encode_cell({ r: R, c: col })];
                return c ? c.v : '';
              };
              const cid = String(get(contractCol)).trim();
              if (!cid || cid.toLowerCase() === 'contract id') continue;
              const blocksToBePaid = parseFloat(get(blocksToBePaidCol)) || 0;
              if (blocksToBePaid > 0) {
                carryOverContracts.push({
                  contractId: cid,
                  blocksToBePaid,
                  totalBlocks: parseFloat(get(totalBlocksCol)) || 0,
                  previouslyInvoiced: parseFloat(get(prevInvoicedCol)) || 0,
                  week: String(get(weekCol) || ''),
                  invoiceNumber,
                });
              }
            }
          }
        }
        resolve({
          rows: arr,
          columns,
          amazonPay,
          detailsTotal,
          invoiceTotal,
          invoiceNumber,
          invoiceDate,
          carrier,
          scac,
          invoiceType,
          carryOverContracts,
          sheetName: detailsSheetName,
        });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Error al leer Excel de Amazon'));
    reader.readAsArrayBuffer(file);
  });
}

/* ====================================================================

function navigate(view) {
  APP.currentView = view;
  document.querySelectorAll('.sidebar nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.view === view);
  });
  refreshCurrentView();
}

function refreshCurrentView() {
  let html = '';
  if (APP.currentView === 'dashboard') html = renderDashboard();
  else if (APP.currentView === 'companies') {
    APP._formTractors = [];
    html = renderCompanies();
  }
  else if (APP.currentView === 'drivers') html = renderDrivers();
  else if (APP.currentView === 'invoice') html = renderInvoice();
  else if (APP.currentView === 'conciliation') html = renderConciliationView();
  else if (APP.currentView === 'archive') html = renderArchiveView();
  else if (APP.currentView === 'payroll') html = renderPayrollView();
  else if (APP.currentView === 'reports') html = renderReports();
  else if (APP.currentView === 'pendientes') html = renderPendientesView();
  else if (APP.currentView === 'tolls') html = renderTollsView();
  else if (APP.currentView === 'myCompany') html = renderMyCompanyView();
  else if (APP.currentView === 'search') html = renderSearchView();
  else if (APP.currentView === 'settings') html = renderSettings();
  document.getElementById('view-root').innerHTML = html;

  // Re-bind drag&drop on the upload zone if we're on invoice step 1
  if (APP.currentView === 'invoice' && APP._invoiceStep === 1) {
    setTimeout(() => {
      const dz = document.getElementById('dropZone');
      if (dz) {
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });

/* ====================================================================
   PART 10: AMAZON RELAY CONCILIATION ENGINE
   ==================================================================== */
/*
   Detects:
   - Future-settlement blocks ("Scheduled to be paid next invoice", "Will be paid next invoice", etc.)
   - Cancelled blocks
   - Duplicate Block IDs
   - $0 blocks
   - Missing required fields
   Returns: { classifications: { inRange, futureSettlement, cancelled, duplicates, zeroPay, missingData, inRange },
              summary: { totals... },
              warnings: [] }
*/

const CONCILIATION = {
  // Regex patterns for "future settlement" indicators
  FUTURE_PATTERNS: [
    /scheduled\s*to\s*be\s*paid\s*next\s*invoice/i,
    /will\s*be\s*paid\s*next\s*invoice/i,
    /future\s*settlement/i,
    /to\s*be\s*paid\s*next/i,
    /next\s*invoice/i,
    /pending\s*settlement/i,
    /deferred\s*payment/i,
  ],
  CANCELLED_PATTERNS: [
    /^cancelled?$/i,
    /^canceled$/i,
    /\bcancel(led|ed)?\b/i,
  ],
  REJECTED_PATTERNS: [
    /^rejected?$/i,
    /\breject(ed)?\b/i,
  ],
  PAID_PATTERNS: [
    /^paid$/i,
    /^completed?$/i,
    /^settled$/i,
    /^closed$/i,
  ],
};

function classifyTrip(trip, allTrips, colMap) {
  const stage = String(trip[colMap.colStage] || '').trim();
  const blockId = String(trip[colMap.colBlock] || '').trim();
  const driver = String(trip[colMap.colDriver] || '').trim();
  const tractor = String(trip[colMap.colTractor] || '').trim();
  const pay = parseMoney(trip[colMap.colPay]);
  const date = parseDate(trip[colMap.colDate]);

  const reasons = [];
  let category = 'inRange';

  // 1. Check for missing required fields
  if (!driver) reasons.push('Sin chofer');
  if (!tractor) reasons.push('Sin tractor');
  if (!blockId) reasons.push('Sin Block ID');
  if (!date) reasons.push('Sin fecha');
  if (reasons.length > 0) {
    category = 'missingData';
  }

  // 2. Check for future settlement
  if (CONCILIATION.FUTURE_PATTERNS.some(rx => rx.test(stage))) {
    reasons.push(`"${stage}" — Pago programado para próxima factura`);
    category = 'futureSettlement';
  }

  // 3. Check cancelled
  if (CONCILIATION.CANCELLED_PATTERNS.some(rx => rx.test(stage))) {
    reasons.push('Viaje cancelado');
    category = 'cancelled';
  }

  // 4. Check rejected
  if (CONCILIATION.REJECTED_PATTERNS.some(rx => rx.test(stage))) {
    reasons.push('Viaje rechazado por Amazon');
    category = 'cancelled';
  }

  // 5. Check $0
  if (pay === 0 && category === 'inRange') {
    reasons.push('Pago $0 (sin valor)');
    category = 'zeroPay';
  }

  // 6. Check duplicates (only flag as duplicate if same Block ID AND same Contract ID AND same exact amount - real duplicate)
  if (blockId && category === 'inRange') {
    const pay = parseMoney(trip[colMap.colPay]);
    const dups = allTrips.filter(t => {
      if (t === trip) return false;
      if (String(t[colMap.colBlock] || '').trim() !== blockId) return false;
      // Only flag as duplicate if also same contract + same amount
      if (colMap.colContract) {
        const tContract = String(t[colMap.colContract] || '').trim();
        const tripContract = String(trip[colMap.colContract] || '').trim();
        if (tContract !== tripContract) return false;
      }
      if (colMap.colPay && Math.abs(parseMoney(t[colMap.colPay]) - pay) > 0.01) return false;
      return true;
    });
    if (dups.length > 0) {
      reasons.push(`Block ID duplicado exacto (aparece ${dups.length + 1} veces con mismo Contract y monto)`);
      category = 'duplicate';
    }
  }

  return { category, reasons, stage, blockId, driver, tractor, pay, date, trip };
}

function runConciliation(rows, colMap) {
  // colMap should include: colBlock, colDriver, colTractor, colPay, colDate, colStage
  const buckets = {
    inRange: [],
    futureSettlement: [],
    cancelled: [],
    duplicate: [],
    zeroPay: [],
    missingData: [],
  };
  const warnings = [];
  const duplicateBlockIds = new Set();

  rows.forEach(row => {
    const cls = classifyTrip(row, rows, colMap);
    buckets[cls.category].push(cls);
    if (cls.category === 'duplicate') duplicateBlockIds.add(cls.blockId);
  });

  // Build summary
  const summary = {
    totalRows: rows.length,
    inRange: buckets.inRange.length,
    futureSettlement: buckets.futureSettlement.length,
    cancelled: buckets.cancelled.length,
    duplicates: buckets.duplicate.length,
    zeroPay: buckets.zeroPay.length,
    missingData: buckets.missingData.length,
    duplicateBlockIds: Array.from(duplicateBlockIds),
    inRangeValue: buckets.inRange.reduce((s, c) => s + c.pay, 0),
    futureValue: buckets.futureSettlement.reduce((s, c) => s + c.pay, 0),
  };

  // Generate human-friendly warnings
  if (summary.futureSettlement > 0) {
    warnings.push({
      level: 'info',
      icon: '⏭️',
      title: `${summary.futureSettlement} bloque(s) con pago futuro`,
      message: `Amazon marcará estos como "paid next invoice". Se guardan como PENDIENTES para la próxima semana. Total: ${money(summary.futureValue)}.`,
    });
  }
  if (summary.cancelled > 0) {
    warnings.push({
      level: 'warning',
      icon: '🚫',
      title: `${summary.cancelled} bloque(s) cancelado(s) o rechazado(s)`,
      message: 'No se pagan ni se reportan.',
    });
  }
  if (summary.duplicates > 0) {
    warnings.push({
      level: 'danger',
      icon: '⚠️',
      title: `${summary.duplicates} Block(s) ID duplicado(s)`,
      message: `Block IDs repetidos: ${summary.duplicateBlockIds.slice(0, 5).join(', ')}${summary.duplicateBlockIds.length > 5 ? '...' : ''}. El sistema tomó solo la primera ocurrencia.`,
    });
  }
  if (summary.zeroPay > 0) {
    warnings.push({
      level: 'info',
      icon: '💰',
      title: `${summary.zeroPay} bloque(s) con pago $0`,
      message: 'Sin valor monetario, no se incluyen en el cálculo.',
    });
  }
  if (summary.missingData > 0) {
    warnings.push({
      level: 'warning',
      icon: '❓',
      title: `${summary.missingData} bloque(s) con datos faltantes`,
      message: 'Les falta chofer, tractor, Block ID o fecha. Revísalos manualmente.',
    });
  }

  return { buckets, summary, warnings, colMap };
}

/* ====================================================================
   PART 12: PAYROLL ENGINE
   ==================================================================== */
/*
   Each driver can have a pay structure:
   - type: 'percentage' (default % of gross)
   - type: 'per_mile' ($X per mile)
   - type: 'fixed_per_block' ($X per block, regardless of miles)

   Plus: deductions, advances, fuel, insurance (configurable per company)
*/

function getDriverPayStructure(driver) {
  if (!driver) return { type: 'percentage', pct: 85, ratePerMile: 0.55, fixedPerBlock: 0 };
  return {
    type: driver.payType || 'percentage',
    pct: driver.pct || 85,
    ratePerMile: driver.ratePerMile || 0.55,
    fixedPerBlock: driver.fixedPerBlock || 0,
  };
}

function calculateDriverPay(driver, trips) {
  const ps = getDriverPayStructure(driver);
  let grossRevenue = 0;
  let totalMiles = 0;
  let blockCount = 0;

  trips.forEach(t => {
    grossRevenue += t.pay;
    totalMiles += t.miles || 0;
    blockCount++;
  });

  let driverPay = 0;
  let formulaUsed = '';

  if (ps.type === 'per_mile') {
    driverPay = totalMiles * ps.ratePerMile;
    formulaUsed = `${totalMiles.toFixed(1)} mi × $${ps.ratePerMile}/mi`;
  } else if (ps.type === 'fixed_per_block') {
    driverPay = blockCount * ps.fixedPerBlock;
    formulaUsed = `${blockCount} bloque(s) × $${ps.fixedPerBlock}`;
  } else {
    // percentage
    driverPay = grossRevenue * (ps.pct / 100);
    formulaUsed = `${money(grossRevenue)} × ${ps.pct}%`;
  }

  // Apply deductions
  const deductions = (driver.deductions || []);
  const totalDeductions = deductions.reduce((s, d) => s + Number(d.amount || 0), 0);

  // Apply fuel, insurance, ELD, IFTA, advances, custom (from company settings)
  const companyDeductions = (driver.companyDeductions || []);
  const totalCompanyDeductions = companyDeductions.reduce((s, d) => s + Number(d.amount || 0), 0);

  const netPay = driverPay - totalDeductions - totalCompanyDeductions;

  return {
    driverId: driver.id,
    driverName: driver.name,
    companyId: driver.companyId,
    companyName: (APP.companies.find(c => c.id === driver.companyId) || {}).name || '—',
    payStructure: ps,
    formulaUsed,
    blockCount,
    totalMiles,
    grossRevenue,
    driverPay,
    deductions,
    totalDeductions,
    companyDeductions,
    totalCompanyDeductions,
    netPay,
  };
}

function calculatePayrollByDriver(trips) {
  // Group trips by driver
  const byDriver = {};
  trips.forEach(t => {
    const key = t.driver || '(sin chofer)';
    if (!byDriver[key]) byDriver[key] = { driver: t.driver, trips: [] };
    byDriver[key].trips.push(t);
  });

  // For each driver, look up registered driver + calculate pay
  const results = [];
  Object.values(byDriver).forEach(grp => {
    const reg = findDriverByName(grp.driver);
    if (reg) {
      results.push(calculateDriverPay(reg, grp.trips));
    } else {
      // Driver not in DB - use defaults
      results.push(calculateDriverPay({
        id: null, name: grp.driver, pct: 85, payType: 'percentage'
      }, grp.trips));
    }
  });

  return results.sort((a, b) => b.grossRevenue - a.grossRevenue);
}

function calculatePayrollByCompany(trips) {
  const byCompany = {};
  trips.forEach(t => {
    const comp = findCompanyByTractor(t.tractor);
    const key = comp ? comp.id : '__unassigned';
    if (!byCompany[key]) byCompany[key] = {
      company: comp,
      trips: [],
      drivers: new Set(),
      tractors: new Set(),
    };
    byCompany[key].trips.push(t);
    if (t.driver) byCompany[key].drivers.add(t.driver);
    if (t.tractor) byCompany[key].tractors.add(t.tractor);
  });

  return Object.values(byCompany).map(g => {
    const totalGross = g.trips.reduce((s, t) => s + t.pay, 0);
    const totalMiles = g.trips.reduce((s, t) => s + (t.miles || 0), 0);
    const blockCount = g.trips.length;
    return {
      company: g.company,
      companyName: g.company ? g.company.name : '⚠️ Sin empresa',
      blockCount,
      totalMiles,
      grossRevenue: totalGross,
      driverCount: g.drivers.size,
      tractorCount: g.tractors.size,
      trips: g.trips,
    };
  }).sort((a, b) => b.grossRevenue - a.grossRevenue);
}

function calculateNetProfit(trips, totalExpenses = 0) {
  // Gross = sum of all trip pay
  // Net = Gross - 10% commission - expenses
  const gross = trips.reduce((s, t) => s + t.pay, 0);
  const commission = gross * (APP.settings.commissionPct || 10) / 100;
  const net = gross - commission - totalExpenses;
  return { gross, commission, net, expenses: totalExpenses };
}


/* ====================================================================
   PART 13: AI-STYLE INSIGHTS & ERROR DETECTION
   ==================================================================== */
/*
   Pattern-based "AI" that detects:
   - Anomalies in driver earnings
   - Unusual tractor usage
   - Mismatched amounts
   - Missing data patterns
   - Duplicate blocks
   - Driver without company
*/

function generateInsights(trips, drivers, companies) {
  const insights = [];
  if (trips.length === 0) return insights;

  // 1. Drivers not in DB
  const driverNames = new Set(drivers.map(d => normalizeStr(d.name)));
  const tripDrivers = new Set(trips.map(t => normalizeStr(t.driver)).filter(Boolean));
  const missingDrivers = [...tripDrivers].filter(d => !driverNames.has(d));
  if (missingDrivers.length > 0) {
    insights.push({
      type: 'warning',
      icon: '👤',
      title: `${missingDrivers.length} ${t('ai.unregistered_drivers')}`,
      message: `Hay choferes en los trips que no están en tu base de datos. Recomiendo agregarlos para que aparezcan en el payroll.`,
      action: { label: t('ai.view_list'), fn: 'navigate("drivers")' },
      details: missingDrivers.slice(0, 10),
    });
  }

  // 2. Tractors not assigned to any company
  const allTractors = new Set();
  companies.forEach(c => (c.tractors || []).forEach(t => allTractors.add(normalizeStr(t))));
  const tripTractors = [...new Set(trips.map(t => normalizeStr(t.tractor)).filter(Boolean))];
  const orphanTractors = tripTractors.filter(t => !allTractors.has(t));
  if (orphanTractors.length > 0) {
    insights.push({
      type: 'warning',
      icon: '🚛',
      title: `${orphanTractors.length} tractor(es) sin empresa asignada`,
      message: 'Estos tractores aparecen en trips pero ninguna empresa los tiene registrados. Asignarlos para que el payroll se calcule bien.',
      action: { label: 'Asignar', fn: 'navigate("companies")' },
      details: orphanTractors.slice(0, 10),
    });
  }

  // 3. Drivers with anomalous earnings (>$5000 in a week or <$100)
  const driverEarnings = {};
  trips.forEach(t => {
    if (!t.driver) return;
    if (!driverEarnings[t.driver]) driverEarnings[t.driver] = 0;
    driverEarnings[t.driver] += t.pay;
  });
  const earnings = Object.values(driverEarnings);
  if (earnings.length >= 3) {
    const avg = earnings.reduce((s, e) => s + e, 0) / earnings.length;
    const std = Math.sqrt(earnings.reduce((s, e) => s + (e - avg) ** 2, 0) / earnings.length);
    const outliers = Object.entries(driverEarnings).filter(([k, v]) => Math.abs(v - avg) > 2.5 * std);
    if (outliers.length > 0) {
      insights.push({
        type: 'info',
        icon: '📊',
        title: `${outliers.length} chofer(es) con earnings fuera de lo normal`,
        message: `Promedio: ${money(avg)} · Detecté choferes que ganaron mucho más o menos de lo típico. Vale la pena verificar.`,
        details: outliers.slice(0, 5).map(([k, v]) => `${k}: ${money(v)}`),
      });
    }
  }

  // 4. Block ID duplicates
  const blockIds = trips.map(t => t.contractId).filter(Boolean);
  const blockCounts = {};
  blockIds.forEach(b => { blockCounts[b] = (blockCounts[b] || 0) + 1; });
  const dupes = Object.entries(blockCounts).filter(([k, v]) => v > 1);
  if (dupes.length > 0) {
    insights.push({
      type: 'danger',
      icon: '⚠️',
      title: `${dupes.length} ${t('ai.duplicate_blocks')}`,
      message: 'Los siguientes Block IDs aparecen más de una vez. Esto puede causar pago doble. Te recomiendo revisar.',
      details: dupes.slice(0, 5).map(([k, v]) => `${k}: ${v} veces`),
    });
  }

  // 5. Mismatched totals: gross - 10% should equal driver pay
  const totalGross = trips.reduce((s, t) => s + t.pay, 0);
  const totalComm = totalGross * 0.10;
  const totalToCompanies = totalGross - totalComm;
  insights.push({
    type: 'info',
    icon: '💰',
    title: t('ai.reconciliation_correct'),
    message: `Gross ${money(totalGross)} = Tu comisión ${money(totalComm)} + A empresas ${money(totalToCompanies)}. Todo cuadra.`,
  });

  // 6. Date gaps: any trip with date in the future?
  const now = new Date();
  const futureTrips = trips.filter(t => t.date && new Date(t.date) > now);
  if (futureTrips.length > 0) {
    insights.push({
      type: 'warning',
      icon: '📅',
      title: `${futureTrips.length} viaje(s) con fecha futura`,
      message: 'Hay trips con fecha posterior a hoy. Verifica que no sea un error de tipeo en el CSV.',
    });
  }

  // 7. Cancelled/rejected analysis
  const cancelledTrips = trips.filter(t => /cancel/i.test(t.stage || ''));
  if (cancelledTrips.length > trips.length * 0.1) {
    insights.push({
      type: 'warning',
      icon: '🚫',
      title: `Alto porcentaje de cancelaciones: ${((cancelledTrips.length / trips.length) * 100).toFixed(1)}%`,
      message: 'Más del 10% de tus trips están cancelados. Esto puede indicar un problema con la calidad de las cargas o los choferes.',
    });
  }

  return insights;
}

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');

  doc.setTextColor(0, 0, 0);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Resumen', 40, y);
  y += 20;
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');

  const totalGross = trips.reduce((s, t) => s + t.pay, 0);
  const totalComm = totalGross * (APP.settings.commissionPct || 10) / 100;
  const totalNet = totalGross - totalComm;

  doc.text(`Total Viajes: ${trips.length}`, 40, y); y += 14;
  doc.text(`Revenue Total: $${totalGross.toFixed(2)}`, 40, y); y += 14;
  doc.text(`Comision (10%): $${totalComm.toFixed(2)}`, 40, y); y += 14;
  doc.text(`A Pagar a Empresas: $${totalNet.toFixed(2)}`, 40, y); y += 30;

  // Table: By Company
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Por Compania', 40, y);
  y += 10;

  // Manual table (avoiding autotable dependency)
  const companyHeader = ['Compania', 'Choferes', 'Tractores', 'Viajes', 'Revenue', 'A Cobrar', 'Mi Comision'];
  const colWidths = [180, 60, 60, 50, 100, 100, 100];
  drawTable(doc, 40, y + 10, colWidths, [companyHeader], payrollByCompany.map(c => [
    c.companyName, c.driverCount, c.tractorCount, c.blockCount,
    `$${c.grossRevenue.toFixed(2)}`, `$${(c.grossRevenue * 0.9).toFixed(2)}`, `$${(c.grossRevenue * 0.1).toFixed(2)}`,
  ]));
  y += 20 + (payrollByCompany.length + 1) * 18;

  if (y > 500) { doc.addPage(); y = 60; }

  // Table: By Driver
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Por Chofer', 40, y);
  y += 10;
  const driverHeader = ['Chofer', 'Compania', 'Tipo Pago', 'Viajes', 'Miles', 'Gross', 'Pay', 'Deducciones', 'Neto'];
  const driverWidths = [120, 110, 80, 40, 50, 80, 80, 70, 80];
  drawTable(doc, 40, y + 10, driverWidths, [driverHeader], payrollByDriver.map(d => [
    d.driverName, d.companyName, d.payStructure.type, d.blockCount, d.totalMiles.toFixed(1),
    `$${d.grossRevenue.toFixed(2)}`, `$${d.driverPay.toFixed(2)}`,
    `$${(d.totalDeductions + d.totalCompanyDeductions).toFixed(2)}`,

    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text(`Pagina ${i} de ${pages} - RelayPay Pro v7.0`, 350, 580);
  }

  doc.save(`relaypay_reporte_${fmtDateInput(new Date())}.pdf`);

}

function drawTable(doc, x, y, colWidths, headers, rows) {
  const lineHeight = 18;
  // Header
  doc.setFillColor(43, 149, 241);
  doc.rect(x, y, colWidths.reduce((s, w) => s + w, 0), lineHeight, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  let cx = x + 4;
  headers[0].forEach((h, i) => {
    doc.text(String(h), cx, y + 12);
    cx += colWidths[i];
  });
  // Rows
  let ry = y + lineHeight;
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(0, 0, 0);
  rows.forEach((row, ri) => {
    if (ri % 2 === 0) {
      doc.setFillColor(248, 250, 252);
      doc.rect(x, ry, colWidths.reduce((s, w) => s + w, 0), lineHeight, 'F');
    }
    cx = x + 4;
    row.forEach((cell, ci) => {
      doc.text(String(cell).slice(0, 30), cx, ry + 12);
      cx += colWidths[ci];
    });
    ry += lineHeight;
  });
}

function getCurrentReportTrips() {
  // Get trips respecting current report filters
  const fDateFrom = document.getElementById('repDateFrom')?.value || '';
  const fDateTo = document.getElementById('repDateTo')?.value || '';
  const fCompany = document.getElementById('repCompany')?.value || '';
  const fDriver = document.getElementById('repDriver')?.value || '';
  const fTractor = document.getElementById('repTractor')?.value || '';

  let trips = [];
  APP.invoices.forEach(inv => (inv.trips || []).forEach(t => {
    trips.push({ ...t, invoiceId: inv.id, invoiceLabel: inv.label, rangeStart: inv.rangeStart, rangeEnd: inv.rangeEnd, commissionPct: inv.commissionPct });
  }));
  if (fDateFrom) trips = trips.filter(t => t.date && new Date(t.date) >= new Date(fDateFrom));
  if (fDateTo) trips = trips.filter(t => t.date && new Date(t.date) <= new Date(fDateTo + 'T23:59:59'));
  if (fCompany) trips = trips.filter(t => {
    const c = findCompanyByTractor(t.tractor);
    return c && c.id === fCompany;
  });
  if (fDriver) trips = trips.filter(t => t.driver === fDriver);
  if (fTractor) trips = trips.filter(t => t.tractor === fTractor);
  return trips;
}

function exportReportCSV() {
  const trips = getCurrentReportTrips();
  if (trips.length === 0) return toast('No hay datos para exportar', 'warning');
  const headers = ['Fecha', 'Chofer', 'Tractor', 'BlockID', 'ContractID', 'Estado', 'Millas', 'Pago', 'Compania'];
  const rows = trips.map(t => {
    const comp = findCompanyByTractor(t.tractor);
    return [
      fmtDate(t.date),
      t.driver,
      t.tractor,
      t.blockId,
      t.contractId,
      t.stage,
      t.miles,
      t.pay.toFixed(2),
      comp ? comp.name : 'Sin empresa',
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `relaypay_reporte_${fmtDateInput(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📊 CSV exportado', 'success');
}

    return {

      BlockID: t.blockId,
      ContractID: t.contractId,

      Millas: t.miles,
      Pago: t.pay,
      Compania: comp ? comp.name : 'Sin empresa',
      Factura: t.invoiceLabel,
    };
  }));
  XLSX.utils.book_append_sheet(wb, ws4, 'Todos los Trips');

  XLSX.writeFile(wb, `relaypay_reporte_${fmtDateInput(new Date())}.xlsx`);
  toast('📊 Excel exportado', 'success');
}

function assignOrphanTractor(tractor, companyId) {
  if (!companyId) return;
  const comp = APP.companies.find(c => c.id === companyId);
  if (!comp) return;
  comp.tractors = comp.tractors || [];
  const exists = comp.tractors.some(t => normalizeTractor(t) === normalizeTractor(tractor));
  if (!exists) {
    comp.tractors.push(tractor);
    comp.updatedAt = new Date().toISOString();
    saveCompanies();
    toast(`✅ Tractor ${tractor} asignado a ${comp.name}`, 'success');
    navigate('conciliation');
  } else {
    toast(`El tractor ya estaba en ${comp.name}`, 'warning');
  }
}

function renderCompanyInvoicesSection(allTrips) {
  if (allTrips.length === 0) return '';
  const byCompany = {};
  allTrips.forEach(t => {
    // Try to find the company for this trip
    let comp = null;
    // 1) If trip has tractor, look for a company that owns that tractor
    if (t.tractor) {
      comp = findCompanyByTractor(t.tractor);
    }
    // 2) Driver → company as fallback (only if no tractor match)
    if (!comp && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg && reg.companyId) {
        const driverComp = APP.companies.find(c => c.id === reg.companyId);
        // If driverCompany has tractors configured, the trip's tractor MUST be in that list
        if (driverComp) {
          if (!driverComp.tractors || driverComp.tractors.length === 0) {
            comp = driverComp;
          } else if (t.tractor && driverComp.tractors.map(x => x.toLowerCase()).includes(t.tractor.toLowerCase())) {
            comp = driverComp;
          }
          // else: driver company has tractors, but this trip's tractor isn't in their list.
          // The trip will be unassigned or matched via other company's tractor list.
        }
      }
    }
    const key = comp ? comp.id : '__none__';
    if (!byCompany[key]) byCompany[key] = { company: comp, trips: [], totalGross: 0 };
    byCompany[key].trips.push(t);
    byCompany[key].totalGross += Number(t.pay || 0);
  });
  Object.values(byCompany).forEach(c => {
    c.totalCommission = c.totalGross * (c.company?.commissionPct != null ? c.company.commissionPct : (APP.settings.commissionPct || 10)) / 100;
    c.totalToCompany = c.totalGross - c.totalCommission;
  });
  const companyList = Object.values(byCompany);
  return `
    <div class="card">
      <div class="card-title">📄 Facturas por Empresa</div>
      <p style="color: var(--text-light); font-size: 13px; margin-bottom: 16px;">
        Genera una <b>factura descargable</b> por cada empresa con el detalle de contratos, fechas de terminación, choferes y monto a pagar. <b>PDF</b> profesional o <b>CSV</b> para Excel.
      </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="cmp.name">Empresa</th>
              <th class="text-right">Blocks/Loads</th>
              <th class="text-right">Viajes</th>
              <th class="text-right">Total Gross</th>
              <th class="text-right">A Pagar (Empresa)</th>
              <th class="text-right">Comisión</th>
              <th>Factura</th>
            </tr>
          </thead>
          <tbody>
            ${companyList.map(c => `
              <tr>
                <td><b>${c.company ? escapeHtml(c.company.name) : '<span class="badge badge-warning">⚠️ Sin empresa</span>'}</b></td>
                <td class="text-right">${[...new Set(c.trips.map(t => t.primaryKey || t.blockId || t.tripId).filter(Boolean))].length}</td>
                <td class="text-right">${c.trips.length}</td>
                <td class="text-right money">${money(c.totalGross)}</td>
                <td class="text-right money money-positive">${money(c.totalToCompany)}</td>
                <td class="text-right money money-mine">${money(c.totalCommission)}</td>
                <td>
                  ${c.company ? `
                    <button class="btn btn-sm btn-primary" onclick="downloadCompanyInvoice('${c.company.id}', APP._selectedPayrollInvoiceId || null)">📄 PDF</button>
                    <button class="btn btn-sm btn-secondary" onclick="downloadCompanyInvoiceCSV('${c.company.id}', APP._selectedPayrollInvoiceId || null)">📋 CSV</button>
                  ` : '<span class="badge badge-gray">—</span>'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function downloadCompanyInvoice(companyId, invoiceId) {
  const comp = APP.companies.find(c => c.id === companyId);
  if (!comp) return toast(t('errors.company_not_found'), 'error');

  // If no invoiceId provided (undefined or empty), show modal to pick one
  if (!invoiceId || invoiceId === 'undefined') {
    return showInvoicePickerModal(companyId, 'pdf');
  }

  const inv = APP.invoices.find(i => i.id === invoiceId);
  if (!inv) return toast('Factura no encontrada', 'error');

  const trips = [];
  (inv.trips || []).forEach(t => {
    // Tractor FIRST, driver fallback (with tractor validation)
    let matches = false;
    if (findCompanyByTractor(t.tractor)?.id === companyId) matches = true;
    else if (t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg && reg.companyId === companyId) {
        if (!comp.tractors || comp.tractors.length === 0) matches = true;
        else if (t.tractor && comp.tractors.map(x => x.toLowerCase()).includes(t.tractor.toLowerCase())) matches = true;
      }
    }
    if (matches) trips.push({ ...t, invoiceLabel: inv.label, invoiceId: inv.id, rangeStart: inv.rangeStart, rangeEnd: inv.rangeEnd });
  });
  if (trips.length === 0) return toast(`No hay viajes de ${comp.name} en esta factura (${inv.label})`, 'warning');
  generateCompanyInvoicePDF(comp, trips, inv);
}

function downloadCompanyInvoiceCSV(companyId, invoiceId) {
  const comp = APP.companies.find(c => c.id === companyId);
  if (!comp) return;
  if (!invoiceId || invoiceId === 'undefined') {
    return showInvoicePickerModal(companyId, 'csv');
  }
  const inv = APP.invoices.find(i => i.id === invoiceId);
  if (!inv) return toast('Factura no encontrada', 'error');
  const trips = [];
  (inv.trips || []).forEach(t => {
    let matches = false;
    // Driver FIRST, tractor FALLBACK
    if (t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg && reg.companyId === companyId) matches = true;
    }
    if (!matches && findCompanyByTractor(t.tractor)?.id === companyId) matches = true;
    if (matches) trips.push({ ...t, invoiceLabel: inv.label, invoiceId: inv.id });
  });
  if (trips.length === 0) return toast('No hay viajes', 'warning');
  const byBlock = {};
  trips.forEach(t => {
    const bid = t.primaryKey || t.blockId || t.tripId || '(sin block)';
    if (!byBlock[bid]) byBlock[bid] = { blockId: bid, type: t.type || 'BLOCK', method: t.calculationMethod || '—', tractor: t.tractor, driver: t.driver, pay: 0, miles: 0, dates: [] };
    byBlock[bid].pay += t.pay;
    byBlock[bid].miles += t.miles || 0;
    if (t.date) byBlock[bid].dates.push(t.date);
  });
  const list = Object.values(byBlock);
  const totalGross = trips.reduce((s, t) => s + t.pay, 0);
  // Per-company commission
  const companyPct = comp.commissionPct != null ? comp.commissionPct : (APP.settings.commissionPct || 10);
  const totalComm = totalGross * (companyPct / 100);
  const totalNet = totalGross - totalComm;
  const rows = list.map(c => [
    c.blockId, c.type, c.method, c.tractor, c.driver,
    c.dates.length ? fmtDate(new Date(Math.max(...c.dates.map(d => new Date(d).getTime())))) : '—',
    c.miles.toFixed(1), c.pay.toFixed(2),
  ]);
  // Compute deductions for this company in this invoice
  let tollDeductions = 0;
  const tollItems = [];
  
  // Helper: identify if a toll belongs to this company
  function tollBelongsToCompanyCSV(t) {
    let cid = t._assignedCompanyId;
    if (!cid && APP.tollAssignments) {
      const key = `${t.invoiceNumber || 'X'}-${t.tripId || t.blockId || t.loadId || 'X'}`;
      cid = APP.tollAssignments[key];
    }
    if (!cid && t.driver) {
      const reg = findDriverByName(t.driver);
      if (reg) cid = reg.companyId;
    }
    if (!cid && t.tractor) {
      const tc = findCompanyByTractor(t.tractor);
      if (tc) cid = tc.id;
    }
    return cid === comp.id;
  }
  
  // 1) Read tolls from the SAVED invoice (inv.tolls) — PRIMARY source
  if (inv && inv.tolls && inv.tolls.length > 0) {
    inv.tolls.forEach(e => {
      if (e.category !== 'Toll Deduction') return;
      if (tollBelongsToCompanyCSV(e)) {
        tollDeductions += Math.abs(e.amount);
        tollItems.push(e);
      }
    });
  }
  
  // 2) Also check the live preview
  if (APP.currentInvoicePreview && APP.currentInvoicePreview.payanoResult) {
    (APP.currentInvoicePreview.payanoResult.expenses || []).forEach(e => {
      if (e.category !== 'Toll Deduction') return;
      if (inv && inv.tolls && inv.tolls.some(it => 
        it.invoiceNumber === e.invoiceNumber && 
        (it.tripId || it.blockId) === (e.tripId || e.blockId) &&
        Math.abs(it.amount - e.amount) < 0.01
      )) return;
      if (tollBelongsToCompanyCSV(e)) {
        tollDeductions += Math.abs(e.amount);
        tollItems.push(e);
      }
    });
  }
  
  // 3) HISTORICAL pending tolls
  const pendingTollItems = [];
  (APP.pendingTolls || []).forEach(p => {
    if (tollBelongsToCompanyCSV(p)) {
      tollDeductions += Math.abs(p.amount);
      pendingTollItems.push(p);
    }
  });
  let manualDeductions = 0;
  const manualItems = [];
  (typeof getCompanyDeductions === 'function' ? getCompanyDeductions() : []).forEach(d => {
    if (d.companyId === comp.id && (!inv || d.invoiceId === inv.id || !d.invoiceId)) {
      manualDeductions += (d.amount || 0);
      manualItems.push(d);
    }
  });
  // Per-block deduction and misc fee
  const csvBlocksCount = trips.length;
  const csvPerBlockDed = comp.perBlockDeduction || 0;
  const csvPerBlockTotal = csvPerBlockDed * csvBlocksCount;
  const csvMiscFee = comp.miscFee || 0;
  
  const totalDeductions = tollDeductions + manualDeductions + csvPerBlockTotal + csvMiscFee;
  const finalAmount = totalNet - totalDeductions;

  const csv = [
    [`Factura - ${comp.name}`],
    [`Semana: ${inv.label}`],
    [`Período: ${fmtDate(inv.rangeStart)} → ${fmtDate(inv.rangeEnd)}`],
    [`Generado: ${new Date().toLocaleString('es-MX')}`],
    [],
    ['Block ID', 'Tipo', 'Método', 'Tractor', 'Chofer', 'Fecha Terminación', 'Millas', 'Monto'],
    ...rows,
    [],
    ...((tollItems.length > 0 || manualItems.length > 0 || csvPerBlockTotal > 0 || csvMiscFee > 0) ? [
      [],
      ['💸 DÉBITOS Y DEDUCCIONES'],
      ['Tipo', 'Trip / Block', 'Invoice', 'Driver', 'Fecha', 'Monto (debito)'],
      ...tollItems.map(e => [
        'Toll Deduction',
        e.tripId || e.blockId || e.loadId || '',
        e.invoiceNumber || '',
        e.driver || '',
        e.invoiceDate ? new Date(e.invoiceDate).toLocaleDateString('es-MX') : '',
        '-' + Math.abs(e.amount).toFixed(2),
      ]),
      ...pendingTollItems.map(p => [
        'Toll Pendiente (sem ' + (p.weeksUnpaid || 0) + ')',
        p.tripId || p.blockId || p.loadId || '',
        p.invoiceNumber || '',
        p.driver || '',
        p.invoiceDate ? new Date(p.invoiceDate).toLocaleDateString('es-MX') : '',
        '-' + Math.abs(p.amount).toFixed(2),
      ]),
      ...manualItems.map(d => [
        (d.category === 'fuel' ? 'Combustible' : d.category === 'tolls' ? 'Peajes' : d.category === 'insurance' ? 'Seguros' : d.category === 'cash_advance' ? 'Avance Efectivo' : 'Otro'),
        d.tripId || d.blockId || '',
        'Manual',
        d.label || '',
        d.date || '',
        '-' + (d.amount || 0).toFixed(2),
      ]),
      ...(csvPerBlockTotal > 0 ? [[
        'Pago por Bloque',
        `${csvBlocksCount} bloques x $${csvPerBlockDed.toFixed(2)}`,
        'Manual',
        '—',
        '—',
        '-' + csvPerBlockTotal.toFixed(2),
      ]] : []),
      ...(csvMiscFee > 0 ? [[
        'Misc Fee',
        'Cargo manual',
        'Manual',
        '—',
        '—',
        '-' + csvMiscFee.toFixed(2),
      ]] : []),
      ['', '', '', '', '', 'TOTAL DÉBITOS', '-' + totalDeductions.toFixed(2)],
      [],
    ] : []),
    ['', '', '', '', '', '', 'TOTAL BRUTO', totalGross.toFixed(2)],
    ['', '', '', '', '', '', `COMISION (${comp.commissionPct != null ? comp.commissionPct : APP.settings.commissionPct}%)`, '-' + totalComm.toFixed(2)],
    ['', '', '', '', '', '', 'NETO A COBRAR (antes débitos)', totalNet.toFixed(2)],
    ...(totalDeductions > 0 ? [['', '', '', '', '', '', '(-) DÉBITOS', '-' + totalDeductions.toFixed(2)]] : []),
    ['', '', '', '', '', '', '💰 FINAL A PAGAR', finalAmount.toFixed(2)],
  ].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Factura_${comp.name.replace(/[^a-z0-9]/gi, '_')}_${fmtDateInput(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('📋 CSV exportado', 'success');
}

      doc.text('—', margin + 290, y + 6);
      doc.text('—', margin + 400, y + 6);
      doc.setTextColor(220, 38, 38);
      doc.setFont('helvetica', 'bold');
      doc.text('-$' + perBlockTotal.toFixed(2), pageWidth - margin - 64, y + 6);
      doc.setFont('helvetica', 'normal');
      y += 14;
    }
    
    // Misc fee (editable per company)
    if (miscFee > 0) {
      doc.setTextColor(180, 83, 9);
      doc.text(`Misc Fee`, margin + 4, y + 6);
      doc.setTextColor(0, 0, 0);
      doc.text(`Cargo manual`, margin + 84, y + 6);
      doc.text('Manual', margin + 200, y + 6);
      doc.text('—', margin + 290, y + 6);
      doc.text('—', margin + 400, y + 6);
      doc.setTextColor(220, 38, 38);
      doc.setFont('helvetica', 'bold');
      doc.text('-$' + miscFee.toFixed(2), pageWidth - margin - 64, y + 6);
      doc.setFont('helvetica', 'normal');
      y += 14;
    }
    
    // Total débitos
    y += 2;
    doc.setDrawColor(220, 220, 220);
    doc.line(margin, y, pageWidth - margin, y);
    y += 12;
    doc.setTextColor(180, 83, 9);
    doc.setFont('helvetica', 'bold');
    doc.text('TOTAL DEBITOS:', margin + 4, y);
    doc.text('-$' + totalDeductions.toFixed(2), pageWidth - margin - 64, y);
    doc.setFont('helvetica', 'normal');
    y += 14;
  }

  // Totals
  y += 10;
  doc.setFillColor(0, 30, 60);
  // Dynamic height: title (20) + 3 left rows (15 each) = 65, plus 4-5 right rows (15 each)
  const rightRows = 4 + (totalDeductions > 0 ? 1 : 0);
  const totalBoxHeight = Math.max(80, 20 + 15 * Math.max(3, rightRows) + 15);
  doc.rect(margin, y, pageWidth - 2 * margin, totalBoxHeight, 'F');
  doc.setTextColor(255, 255, 255);

  // Left column: stats
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('RESUMEN', margin + 10, y + 15);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text(`Blocks/Loads: ${list.length}`, margin + 10, y + 32);
  doc.text(`Viajes: ${trips.length}`, margin + 10, y + 47);
  doc.text(`Millas totales: ${totalMiles.toFixed(1)}`, margin + 10, y + 62);

  // Right column: financials — each row offset by 15px, no overlap
  const pct = comp.commissionPct != null ? comp.commissionPct : APP.settings.commissionPct;
  let ry = y + 20; // start Y for right column
  const rightX = margin + 175;
  const valX = pageWidth - margin - 95;

  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('TOTAL BRUTO:', rightX, ry);
  doc.text('$' + totalGross.toFixed(2), valX, ry);
  ry += 15;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text(`Comision (${pct}%):`, rightX, ry);
  doc.setFont('helvetica', 'bold');
  doc.text('-$' + totalComm.toFixed(2), valX, ry);
  ry += 15;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Neto a Cobrar (antes de debitos):', rightX, ry);
  doc.setFont('helvetica', 'bold');
  doc.text('$' + totalNet.toFixed(2), valX, ry);
  ry += 15;

  if (totalDeductions > 0) {
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(254, 165, 100);
    doc.text('(-) Debitos y deducciones:', rightX, ry);
    doc.setFont('helvetica', 'bold');
    doc.text('-$' + totalDeductions.toFixed(2), valX, ry);
    ry += 15;
  }

  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(254, 165, 30);
  doc.text('FINAL A PAGAR:', rightX, ry);
  doc.text('$' + finalAmount.toFixed(2), valX, ry);

  y += totalBoxHeight;

  // Footer
  doc.setTextColor(150, 150, 150);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  const pages = doc.internal.pages.length - 1;
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.text(`Pagina ${i} de ${pages} - Generado por RelayPay Pro v7.1`, pageWidth / 2 - 100, 770);
  }

  doc.save(`Factura_${comp.name.replace(/[^a-z0-9]/gi, '_')}_${fmtDateInput(new Date())}.pdf`);
  toast(`Factura PDF de ${comp.name} descargada`, 'success');
}
