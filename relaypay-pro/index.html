<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Amazon Relay Payroll Calculator — RelayPay Pro">
  <title>Amazon Relay Payroll Calculator</title>

  <!-- Favicon (small inline SVG placeholder; full logo injected at runtime from config/logo.js) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a73e8'/%3E%3Ctext x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-family='Arial' font-weight='bold'%3ER%3C/text%3E%3C/svg%3E">

  <!-- Stylesheets (modular architecture) -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/buttons.css">
  <link rel="stylesheet" href="./css/forms.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/responsive.css">
  <link rel="stylesheet" href="./css/toast.css">
</head>
<body>
  <!-- SPA shell: sidebar + main content area -->
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="logo-area">
        <div class="logo-icon">
          <img src="./logo.svg" alt="RelayPay Pro" onerror="this.style.display='none'">
        </div>
        <div class="logo-text">
          <div class="logo-name">Relay<span class="pay">Pay</span></div>
          <div class="logo-sub">PROFESSIONAL</div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="footer">
        <div>v7.6.6 &copy; RelayPay</div>
      </div>
    </aside>
    <div class="main">
      <div id="userInfoSlot"></div>
      <div id="view-root"></div>
    </div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- Application bootstrap (ES module) -->
  <script type="module" src="./js/main.js"></script>

  <!-- Global error handler — show errors visibly instead of blank page -->
  <script>
    (function() {
      function show(msg) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fee;color:#900;padding:12px;font:13px monospace;z-index:99999;white-space:pre-wrap;border-bottom:2px solid #900;';
        d.textContent = msg;
        (document.body || document.documentElement).appendChild(d);
      }
      window.addEventListener('error', function(e) {
        show('[ERR] ' + (e.message || 'unknown') + '\n' + (e.filename || '') + ':' + (e.lineno || 0));
      });
      window.addEventListener('unhandledrejection', function(e) {
        var r = e.reason || {};
        show('[REJECT] ' + (r.message || r.toString() || 'unknown'));
      });
    })();
  </script>
</body>
</html>
